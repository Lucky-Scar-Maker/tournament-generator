<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tournament Generator</title>
<script>
// Apply saved theme synchronously to prevent flash-of-unstyled-theme on load.
(function () {
  try {
    var raw = localStorage.getItem('fifa-tg-v2');
    var s = raw ? JSON.parse(raw) : null;
    var t = (s && s.settings && s.settings.theme) || 'classic';
    var VALID = ['classic','midnight'];
    if (VALID.indexOf(t) === -1) t = 'classic'; // retired themes (pl/stadium/arcade/news) -> classic
    document.documentElement.dataset.theme = t;
  } catch (e) { document.documentElement.dataset.theme = 'classic'; }
})();
</script>
<style>
  :root {
    --bg: #f4f6fb;
    --bg-grad:
      radial-gradient(1100px 560px at 82% -12%, #e8ecff 0%, rgba(232,236,255,0) 60%),
      radial-gradient(820px 480px at -8% 4%, #e3f8f4 0%, rgba(227,248,244,0) 55%),
      #f4f6fb;
    --card: #ffffff;
    --card-2: #f7f9fc;
    --border: #e8edf4;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --muted: #64748b;
    --muted-2: #94a3b8;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --accent-soft: rgba(79, 70, 229, .12);
    --accent-ring: rgba(79, 70, 229, .35);
    --success: #16a34a;
    --danger: #e11d48;
    --warning: #d97706;
    --gold: #eab308;
    --silver: #94a3b8;
    --bronze: #b45309;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, .04), 0 1px 1px rgba(15, 23, 42, .03);
    --shadow-md: 0 4px 6px -2px rgba(15, 23, 42, .06), 0 14px 28px -10px rgba(15, 23, 42, .12);
    --shadow-lg: 0 18px 48px -12px rgba(15, 23, 42, .22);
    --radius: 12px;
    --radius-lg: 18px;
    --t: 200ms cubic-bezier(.2,.8,.2,1);
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-grad, var(--bg));
    background-attachment: fixed;
    min-height: 100vh;
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "kern", "liga", "calt";
  }
  .container { max-width: 1120px; margin: 0 auto; padding: 24px; }
  header.app-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    padding: 16px 24px;
    background: color-mix(in srgb, var(--card) 78%, transparent);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
  }
  header h1 {
    font-size: 1.18rem; margin: 0; font-weight: 800; letter-spacing: -.02em;
    display: inline-flex; align-items: center; gap: 10px;
  }
  header h1 .logo {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, #22d3ee));
    color: #fff; font-size: 1rem;
    box-shadow: 0 4px 12px -2px var(--accent-soft);
  }
  header h1 .sub { color: var(--muted); font-weight: 500; margin-left: 2px; font-size: .92rem; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    appearance: none; border: 1px solid var(--border); background: var(--card);
    color: var(--text); padding: 8px 14px; border-radius: 10px;
    font-size: .92rem; font-weight: 600; cursor: pointer;
    transition: background var(--t), border-color var(--t), transform var(--t), box-shadow var(--t);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--card-2); border-color: var(--border-strong); }
  .btn:active { transform: translateY(1px); }
  .btn[disabled] { opacity: .5; cursor: not-allowed; }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    color: white; border-color: transparent;
    box-shadow: 0 6px 16px -6px var(--accent-ring);
  }
  .btn.primary:hover { filter: brightness(1.06); box-shadow: 0 10px 22px -8px var(--accent-ring); }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { background: #fef2f2; border-color: #fecaca; }
  .btn.ghost { background: transparent; border-color: transparent; }
  .btn.ghost:hover { background: var(--card-2); }
  .btn.small { padding: 5px 10px; font-size: .85rem; }
  .btn.icon { padding: 6px 8px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-md);
    margin-bottom: 20px;
    animation: riseIn 420ms cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .container > .tabs { animation: fadeIn 300ms ease both; }
  .matchday { animation: riseIn 380ms cubic-bezier(.2,.8,.2,1) both; }
  @media (prefers-reduced-motion: reduce) {
    .card, .matchday, .container > .tabs { animation: none; }
  }
  .card h2 { margin: 0 0 4px; font-size: 1.1rem; font-weight: 700; }
  .card .help { color: var(--muted); font-size: .9rem; margin: 0 0 18px; }

  .field { margin: 14px 0; }
  .field label { display: block; font-weight: 600; font-size: .9rem; margin-bottom: 6px; }
  .field .hint { color: var(--muted); font-size: .82rem; margin-top: 4px; }
  .field-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .field-row > * { flex: 1; min-width: 180px; }

  select, input[type="text"], input[type="number"] {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font: inherit;
    background: var(--card);
    color: var(--text);
    transition: border-color var(--t), box-shadow var(--t);
  }
  select:focus, input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-ring);
  }
  input[type="number"] { text-align: center; -moz-appearance: textfield; appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
    margin: 12px 0;
  }
  .player-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    transition: border-color var(--t), box-shadow var(--t), opacity var(--t);
  }
  .player-row .drag-handle {
    cursor: grab; color: var(--muted-2); font-size: 1.05rem; line-height: 1;
    padding: 0 1px; flex-shrink: 0; user-select: none;
    transition: color var(--t);
  }
  .player-row .drag-handle:hover { color: var(--text); }
  .player-row .drag-handle:active { cursor: grabbing; }
  .player-row.dragging { opacity: .45; }
  .player-row.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-ring); }
  .player-row .num { color: var(--muted); font-size: .8rem; width: 20px; text-align: center; flex-shrink: 0; }
  .player-row .flag-pick {
    width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--border);
    background: white; font-size: 1.4rem; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .player-row input { padding: 7px 9px; }

  .flag-picker-pop {
    position: absolute; z-index: 100;
    background: var(--card); border: 1px solid var(--border-strong);
    border-radius: 10px; padding: 8px; box-shadow: var(--shadow-md);
    max-width: 280px; max-height: 240px; overflow: auto;
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .flag-picker-pop button {
    width: 32px; height: 32px; border: none; background: transparent;
    border-radius: 6px; font-size: 1.2rem; cursor: pointer;
  }
  .flag-picker-pop button:hover { background: var(--card-2); }

  .tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 10px 16px;
    background: transparent; border: none;
    color: var(--muted); font: inherit; font-weight: 600; font-size: .95rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .badge {
    display: inline-block; margin-left: 6px;
    background: var(--card-2); border: 1px solid var(--border);
    color: var(--muted);
    padding: 1px 7px; border-radius: 999px; font-size: .75rem; font-weight: 600;
  }

  .matchday { margin-bottom: 22px; }
  .matchday-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 14px 0 10px;
    padding: 8px 0 8px 12px;
    border-left: 4px solid var(--accent);
  }
  .matchday-header h3 { margin: 0; font-size: 1rem; font-weight: 700; }
  .matchday-header .meta { color: var(--muted); font-size: .85rem; }

  .match {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 16px;
    margin: 10px 0;
    box-shadow: var(--shadow-sm);
    transition: border-color var(--t), background var(--t), box-shadow var(--t), transform var(--t);
  }
  .match:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .match.locked { background: var(--card-2); }
  .match.played { border-color: color-mix(in srgb, var(--success) 32%, var(--border)); }
  .match.bye { background: var(--card-2); border-style: dashed; }
  .bye-badge {
    font-size: .72rem; font-weight: 700; letter-spacing: .03em;
    color: var(--muted); background: var(--card);
    border: 1px solid var(--border); border-radius: 999px; padding: 3px 10px;
    white-space: nowrap;
  }
  .swiss-next { text-align: center; margin-top: 8px; }
  .swiss-next .help { margin: 0 0 10px; }
  .match .team {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600;
    min-width: 0;
  }
  .match .team .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .match .team .flag { font-size: 1.4rem; flex-shrink: 0; }
  .match .team.home { justify-content: flex-end; text-align: right; }
  .match .team.away { justify-content: flex-start; }
  .match .center {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    min-width: 120px;
  }
  .match .scores { display: flex; align-items: center; gap: 6px; }
  .match .scores input {
    width: 48px; padding: 6px; font-weight: 700; font-size: 1rem;
  }
  .match .scores .dash { color: var(--muted); font-weight: 700; }
  .match .below {
    display: flex; gap: 7px; align-items: center; justify-content: center;
    flex-wrap: wrap;
  }
  .match .match-action {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--card-2); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
    font: inherit; font-size: .76rem; font-weight: 600;
    padding: 5px 11px; border-radius: 999px;
    transition: color var(--t), background var(--t), border-color var(--t);
  }
  .match .match-action:hover { color: var(--text); background: var(--card); border-color: var(--border-strong); }
  .match .match-action.active { color: var(--accent); background: var(--accent-soft); border-color: var(--accent); }
  .match .match-action.danger:hover { color: var(--danger); border-color: var(--danger); background: color-mix(in srgb, var(--danger) 9%, var(--card)); }
  .match .match-action .ico { font-size: .85rem; line-height: 1; }
  .scorers-row {
    grid-column: 1 / -1;
    display: none;
    padding: 8px 0 0;
    border-top: 1px dashed var(--border);
    margin-top: 8px;
  }
  .scorers-row.open { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .scorers-row label { font-size: .8rem; color: var(--muted); font-weight: 500; }
  .scorers-row input { font-size: .9rem; padding: 6px 8px; }
  .pen-row { grid-column: 1 / -1; display: none; padding: 8px 0 0; }
  .pen-row.open { display: flex; gap: 10px; align-items: center; justify-content: center; }
  .pen-row .pen-label { font-size: .8rem; color: var(--muted); font-weight: 600; }

  table.standings {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  table.standings th, table.standings td {
    padding: 12px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    font-size: .92rem;
  }
  table.standings th {
    background: var(--card-2);
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: .72rem;
    letter-spacing: .04em;
  }
  table.standings tbody tr { transition: background var(--t); }
  table.standings tbody tr:hover { background: var(--card-2); }
  table.standings td.team-cell {
    text-align: left;
    font-weight: 600;
    padding-left: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  table.standings .pos { font-weight: 700; color: var(--muted); width: 36px; }
  table.standings .pos.gold { color: var(--gold); }
  table.standings .pos.silver { color: var(--silver); }
  table.standings .pos.bronze { color: var(--bronze); }
  table.standings .qual { border-left: 3px solid var(--success); }
  table.standings .qual-out { opacity: .85; }
  .gd-plus { color: var(--success); font-weight: 600; }
  .gd-minus { color: var(--danger); font-weight: 600; }
  .pts { font-weight: 700; }
  .form-bar { display: inline-flex; gap: 3px; margin-left: 6px; }
  .form-pip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 4px;
    font-size: .65rem; font-weight: 700; color: white;
    line-height: 1;
  }
  .form-pip.W { background: var(--success); }
  .form-pip.D { background: var(--muted-2); }
  .form-pip.L { background: var(--danger); }

  .tt {
    position: relative; cursor: help;
    border-bottom: 1px dotted var(--muted-2);
  }
  .tt:hover::after, .tt:focus::after {
    content: attr(data-tip);
    position: absolute; left: 50%; bottom: calc(100% + 6px); transform: translateX(-50%);
    background: #111827; color: white; padding: 6px 10px; border-radius: 6px;
    font-size: .78rem; white-space: pre; z-index: 10;
    box-shadow: var(--shadow-md);
  }

  /* Knockout bracket */
  .bracket {
    display: flex;
    gap: 36px;
    overflow-x: auto;
    padding: 8px 4px 20px;
  }
  .bracket-round {
    display: flex; flex-direction: column;
    justify-content: space-around;
    gap: 16px;
    min-width: 240px;
    flex-shrink: 0;
    position: relative;
  }
  /* Connector lines flowing from one round into the next */
  .bracket-round:not(:last-child) .ko-match::after {
    content: ''; position: absolute; top: 50%; left: 100%;
    width: 18px; height: 2px; background: var(--border-strong);
    border-radius: 2px;
  }
  .bracket-round:not(:first-child) .ko-match::before {
    content: ''; position: absolute; top: 50%; right: 100%;
    width: 18px; height: 2px; background: var(--border-strong);
    border-radius: 2px;
  }
  .bracket-round h4 {
    margin: 0; text-align: center; font-size: .85rem; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted);
  }
  .ko-match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    box-shadow: var(--shadow-sm);
    position: relative;
    transition: box-shadow var(--t), transform var(--t), border-color var(--t);
  }
  .ko-match:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .ko-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 4px 0;
  }
  .ko-row.winner {
    font-weight: 700;
    background: var(--accent-soft);
    border-radius: 7px;
    margin: 2px -6px; padding: 4px 6px;
  }
  .ko-row.loser { opacity: .5; }
  .ko-row .who { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .ko-row .who .flag { flex-shrink: 0; }
  .ko-row .who .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ko-row input { width: 42px; padding: 4px; text-align: center; font-weight: 700; }
  .ko-row .ko-agg { font-weight: 800; font-variant-numeric: tabular-nums; min-width: 24px; text-align: center; }
  .ko-divider { height: 1px; background: var(--border); margin: 4px -12px; }
  .ko-meta { font-size: .72rem; color: var(--muted); margin-top: 6px; text-align: center; }
  .ko-tbd { color: var(--muted-2); font-style: italic; }
  /* Two-leg score entry */
  .ko-legs { margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); display: flex; flex-direction: column; gap: 6px; }
  .ko-leg { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .ko-leg .leg-tag { font-size: .62rem; font-weight: 700; letter-spacing: .04em; color: var(--muted-2); width: 16px; flex-shrink: 0; }
  .ko-leg .flag { font-size: 1rem; flex-shrink: 0; }
  .ko-leg input { width: 38px; padding: 4px; text-align: center; font-weight: 700; }
  .ko-leg .leg-dash { color: var(--muted); }

  .stat-grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px;
  }
  .stat-card h4 { margin: 0 0 10px; font-size: .9rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em; }
  .stat-card .big { font-size: 1.4rem; font-weight: 800; }
  .stat-card .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: .92rem; }
  .stat-card .row + .row { border-top: 1px dashed var(--border); }
  .stat-card .row .label { color: var(--muted); }

  .group-section { margin-bottom: 24px; }
  .group-section h3 {
    margin: 0 0 8px; font-size: .9rem; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted);
  }

  .empty {
    color: var(--muted); text-align: center; padding: 30px;
    border: 1px dashed var(--border); border-radius: var(--radius-lg);
    background: var(--card);
  }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #111827; color: white; padding: 10px 16px; border-radius: 999px;
    font-size: .9rem; opacity: 0; transition: opacity var(--t), transform var(--t);
    pointer-events: none; z-index: 200;
    box-shadow: var(--shadow-md);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(15,23,42,.45);
    display: none; align-items: center; justify-content: center; z-index: 300;
    padding: 16px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--card); border-radius: var(--radius-lg);
    max-width: 480px; width: 100%; padding: 22px;
    box-shadow: var(--shadow-md);
  }
  .modal h3 { margin: 0 0 8px; }
  .modal p { color: var(--muted); margin: 0 0 16px; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal textarea {
    width: 100%; min-height: 100px; font-family: ui-monospace, monospace; font-size: .85rem;
    padding: 8px; border: 1px solid var(--border); border-radius: 8px;
  }

  .champion-banner {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border: 1px solid #fbbf24;
    color: #78350f;
    border-radius: var(--radius-lg);
    padding: 18px 22px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .champion-banner .trophy { font-size: 2.2rem; }
  .champion-banner .name { font-size: 1.3rem; font-weight: 800; }
  .champion-banner .label { font-size: .85rem; text-transform: uppercase; letter-spacing: .06em; opacity: .8; }

  /* ============================================================
     v3 additions: filter chips, FAB, saved-pulse, hint, collapsible matchdays
     ============================================================ */
  .filter-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .chip {
    appearance: none;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 999px;
    font: inherit;
    font-size: .82rem;
    font-weight: 500;
    cursor: pointer;
    transition: background var(--t), border-color var(--t), color var(--t);
  }

<script>
/* ============================================================
   Tournament Generator — v2 rewrite
   Single-file vanilla. No build step.

   Engine:
   - Circle-method round-robin (proper matchdays, n-1 per cycle)
   - Optional double round (home & away)
   - Head-to-head tiebreaker (pairwise; falls back to GD/GF)
   - Knockout bracket seeding (League+KO, Groups+KO)
   - Stable player IDs so duplicate names don't corrupt the table
   - localStorage autosave + URL-hash share links
   ============================================================ */

const STORE_KEY = 'fifa-tg-v2';
const VERSION = 2;

const FLAGS = [
  '⚽','🏆','🥅','🎯','🔥','⭐',
  '🇦🇷','🇧🇷','🇩🇪','🇫🇷','🇮🇹','🇪🇸','🇬🇧','🏴󠁧󠁢󠁥󠁮󠁧󠁿','🏴󠁧󠁢󠁳󠁣󠁴󠁿','🏴󠁧󠁢󠁷󠁬󠁳󠁿',
  '🇵🇹','🇳🇱','🇧🇪','🇭🇷','🇩🇰','🇸🇪','🇳🇴','🇨🇭','🇦🇹','🇵🇱',
  '🇺🇸','🇲🇽','🇨🇦','🇨🇴','🇨🇱','🇺🇾','🇪🇨','🇯🇵','🇰🇷','🇦🇺',
  '🇸🇦','🇲🇦','🇸🇳','🇨🇲','🇳🇬','🇪🇬','🇬🇭','🇨🇮','🇿🇦','🇹🇷',
  '🇮🇪','🇮🇸','🇨🇿','🇸🇰','🇭🇺','🇷🇸','🇬🇷','🇺🇦','🇷🇺','🇷🇴',
];

const DEFAULT_AVATAR = '⚽';

let state = null;       // current tournament state
let activeTab = 'fixtures';
let pendingFlag = null; // id of player whose flag picker is open
let dragFromIdx = null; // setup: index of player row being dragged
let saveTimer = null;
let soundOn = true;
let fixtureFilter = 'all';   // 'all' | 'unplayed' | 'played' | 'player:<id>'
let mdExpansionOverrides = new Map(); // matchday key -> 'expanded' | 'collapsed'

const HINT_KEY = 'fifa-tg-v2-hint-dismissed';

/* ---------------- Utilities ---------------- */
function uid() { return Math.random().toString(36).slice(2, 9); }
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else if (v === false || v == null) continue;
    else if (v === true) node.setAttribute(k, '');
    else node.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    node.append(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return node;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
// A match counts as "played" if it's a Swiss bye or has both scores entered.
function matchPlayed(m) { return m.bye != null || (m.homeScore != null && m.awayScore != null); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

/* ---------------- Round-robin (circle method) ----------------
   For n players, produces n-1 matchdays of n/2 matches each.
   If n is odd, one player gets a bye per matchday.
   home/away alternates roughly. Players can swap home/away per match
   from the UI if they want.
*/
function generateRoundRobin(playerIds, doubleRound = false, groupTag = null) {
  let teams = playerIds.slice();
  const hasBye = teams.length % 2 !== 0;
  if (hasBye) teams.push(null);
  const n = teams.length;
  if (n < 2) return [];

  const matchdays = [];
  let arr = teams.slice();

  for (let r = 0; r < n - 1; r++) {
    const md = [];
    for (let i = 0; i < n / 2; i++) {
      const a = arr[i];
      const b = arr[n - 1 - i];
      if (a === null || b === null) continue;
      // Simple alternation: roughly balances who appears as "home"
      const aHome = (r + i) % 2 === 0;
      md.push({
        id: uid(),
        home: aHome ? a : b,
        away: aHome ? b : a,
        homeScore: null,
        awayScore: null,
        homeScorers: '',
        awayScorers: '',
        locked: false,
        scorersOpen: false,
        group: groupTag,
      });
    }
    matchdays.push(md);
    // Rotate: fix position 0, rotate positions 1..n-1 by moving last to position 1
    arr = [arr[0], arr[n - 1], ...arr.slice(1, n - 1)];
  }

  if (doubleRound) {
    const reverse = matchdays.map(md =>
      md.map(m => ({
        ...m, id: uid(),
        home: m.away, away: m.home,
        homeScore: null, awayScore: null,
        homeScorers: '', awayScorers: '',
        locked: false, scorersOpen: false,
      }))
    );
    return matchdays.concat(reverse);
  }
  return matchdays;
}

/* ---------------- Standings ---------------- */
function emptyRow(p) {
  return { id: p.id, name: p.name, avatar: p.avatar,
    played: 0, won: 0, drawn: 0, lost: 0,
    gf: 0, ga: 0, gd: 0, points: 0,
    form: [],          // ordered "W"/"D"/"L"
    cleanSheets: 0,
    goalsConceded: 0,
  };
}

function applyResult(rows, byId, m) {
  // Swiss bye: the player gets a free win (3 pts, no goals).
  if (m.bye != null) {
    const r = rows[byId[m.bye]];
    if (r) { r.played++; r.won++; r.points += 3; r.form.push('W'); }
    return;
  }
  if (m.homeScore == null || m.awayScore == null) return;
  const hi = byId[m.home], ai = byId[m.away];
  const h = rows[hi], a = rows[ai];
  h.played++; a.played++;
  h.gf += m.homeScore; h.ga += m.awayScore;
  a.gf += m.awayScore; a.ga += m.homeScore;
  h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
  if (m.awayScore === 0) h.cleanSheets++;
  if (m.homeScore === 0) a.cleanSheets++;
  if (m.homeScore > m.awayScore) {
    h.won++; h.points += 3; a.lost++;
    h.form.push('W'); a.form.push('L');
  } else if (m.homeScore < m.awayScore) {
    a.won++; a.points += 3; h.lost++;
    a.form.push('W'); h.form.push('L');
  } else {
    h.drawn++; a.drawn++; h.points++; a.points++;
    h.form.push('D'); a.form.push('D');
  }
}

function computeTable(players, fixtures) {
  const rows = players.map(emptyRow);
  const byId = {};
  players.forEach((p, i) => byId[p.id] = i);
  fixtures.forEach(m => applyResult(rows, byId, m));

  // Sort with head-to-head as second-level tiebreaker.
  // Algorithm: group teams by points → within each group, run a mini h2h table
  // (pairwise points among that group only), sort by (h2h pts → h2h gd → overall gd → overall gf).
  // For two-team ties this is just direct h2h. For 3+ ties it's a mini-league.
  rows.sort((a, b) => b.points - a.points);

  const final = [];
  let i = 0;
  while (i < rows.length) {
    let j = i;
    while (j + 1 < rows.length && rows[j + 1].points === rows[i].points) j++;
    if (j === i) { final.push({ ...rows[i], tieNote: null }); i++; continue; }

    // Tied group rows[i..j]
    const group = rows.slice(i, j + 1);
    const groupIds = new Set(group.map(r => r.id));
    const h2h = {};
    group.forEach(r => h2h[r.id] = { pts: 0, gd: 0, gf: 0 });
    fixtures.forEach(m => {
      if (m.homeScore == null || m.awayScore == null) return;
      if (!groupIds.has(m.home) || !groupIds.has(m.away)) return;
      const H = h2h[m.home], A = h2h[m.away];
      H.gf += m.homeScore; A.gf += m.awayScore;
      H.gd += m.homeScore - m.awayScore;
      A.gd += m.awayScore - m.homeScore;
      if (m.homeScore > m.awayScore) H.pts += 3;
      else if (m.homeScore < m.awayScore) A.pts += 3;
      else { H.pts++; A.pts++; }
    });
    group.sort((a, b) => {
      const A = h2h[a.id], B = h2h[b.id];
      if (B.pts !== A.pts) return B.pts - A.pts;
      if (B.gd !== A.gd) return B.gd - A.gd;
      if (b.gd !== a.gd) return b.gd - a.gd;
      if (b.gf !== a.gf) return b.gf - a.gf;
      return a.name.localeCompare(b.name);
    });
    group.forEach((row, idxInGroup) => {
      let tieNote = null;
      if (group.length > 1) {
        const A = h2h[row.id];
        tieNote = `Tied on ${row.points} pts. H2H: ${A.pts} pts, GD ${A.gd >= 0 ? '+' + A.gd : A.gd}. Then overall GD ${row.gd >= 0 ? '+' + row.gd : row.gd}, GF ${row.gf}.`;
      }
      final.push({ ...row, tieNote });
    });
    i = j + 1;
  }
  return final;
}

/* ---------------- Knockout bracket ---------------- */
// Standard single-elimination seeding: 1 vs N, 2 vs N-1, then bracketed so #1 and #2 only meet in the final.
function seedKnockout(seedsInOrder) {
  // seedsInOrder = [{playerId, label}], 1st seed first
  const n = seedsInOrder.length;
  if (n < 2 || (n & (n - 1)) !== 0) {
    // pad to next power of 2 with null (= bye)
    let target = 1; while (target < n) target *= 2;
    while (seedsInOrder.length < target) seedsInOrder.push(null);
  }
  const N = seedsInOrder.length;
  // Build bracket order so that seed pairs interleave correctly
  // Standard pairing positions: e.g. for 8: [1,8,4,5,2,7,3,6]
  function bracketOrder(size) {
    let order = [1, 2];
    while (order.length < size) {
      const next = [];
      const sum = order.length * 2 + 1;
      for (const s of order) { next.push(s); next.push(sum - s); }
      order = next;
    }
    return order;
  }
  const order = bracketOrder(N);
  return order.map(rank => seedsInOrder[rank - 1] || null);
}

function buildKoBracket(seedsInOrder, type) {
  // type: 'standard' or 'cross-group'
  let positions;
  if (type === 'cross-group') {
    // Special: groups+KO with top 2 from 2 groups → SF: A1 vs B2, B1 vs A2
    // expects seedsInOrder = [A1, B1, A2, B2] for 4-team, or longer for more groups.
    // For 2 groups top 2: A1 vs B2, B1 vs A2.
    if (seedsInOrder.length === 4) {
      positions = [seedsInOrder[0], seedsInOrder[3], seedsInOrder[1], seedsInOrder[2]];
    } else {
      // Fallback to standard
      positions = seedKnockout(seedsInOrder.slice());
    }
  } else {
    positions = seedKnockout(seedsInOrder.slice());
  }

  // Build rounds: round 0 = first round, each subsequent round halves
  const rounds = [];
  let firstRound = [];
  for (let i = 0; i < positions.length; i += 2) {
    firstRound.push({
      id: uid(),
      home: positions[i] ? positions[i].playerId : null,
      away: positions[i + 1] ? positions[i + 1].playerId : null,
      homeLabel: positions[i] ? positions[i].label : 'BYE',
      awayLabel: positions[i + 1] ? positions[i + 1].label : 'BYE',
      homeScore: null, awayScore: null,
      homePen: null, awayPen: null,
      penOpen: false,
    });
  }
  rounds.push(firstRound);
  while (rounds[rounds.length - 1].length > 1) {
    const prev = rounds[rounds.length - 1];
    const next = [];
    for (let i = 0; i < prev.length; i += 2) {
      next.push({
        id: uid(),
        home: null, away: null,
        homeLabel: `Winner of ${i + 1}`, awayLabel: `Winner of ${i + 2}`,
        homeScore: null, awayScore: null,
        homePen: null, awayPen: null,
        penOpen: false,
        prevHome: prev[i].id,
        prevAway: prev[i + 1].id,
      });
    }
    rounds.push(next);
  }

  // Third place playoff: losers of penultimate round
  let thirdPlace = null;
  if (rounds.length >= 2) {
    const sf = rounds[rounds.length - 2];
    if (sf.length === 2) {
      thirdPlace = {
        id: uid(),
        home: null, away: null,
        homeLabel: 'Loser of SF1', awayLabel: 'Loser of SF2',
        homeScore: null, awayScore: null,
        homePen: null, awayPen: null,
        penOpen: false,
        loserOf: [sf[0].id, sf[1].id],
      };
    }
  }

  // Tag legs: non-final rounds are two-legged when koLegs === 2; final & 3rd-place stay single.
  const legs = state && state.koLegs === 2 ? 2 : 1;
  rounds.forEach((round, ri) => {
    const isFinal = ri === rounds.length - 1;
    round.forEach(mm => { mm.legs = isFinal ? 1 : legs; });
  });
  if (thirdPlace) thirdPlace.legs = 1;

  return { rounds, thirdPlace };
}

function koRoundLabel(roundIdx, totalRounds) {
  const fromEnd = totalRounds - 1 - roundIdx;
  if (fromEnd === 0) return 'Final';
  if (fromEnd === 1) return 'Semi-Finals';
  if (fromEnd === 2) return 'Quarter-Finals';
  if (fromEnd === 3) return 'Round of 16';
  return `Round ${roundIdx + 1}`;
}

function koResolveBracket(ko) {
  // Propagate winners through the bracket based on completed scores.
  if (!ko) return;
  const matches = ko.rounds.flat();
  const byId = {};
  matches.forEach(m => byId[m.id] = m);

  for (const m of matches) {
    if (m.prevHome && byId[m.prevHome]) {
      const winner = koWinner(byId[m.prevHome]);
      if (winner) {
        m.home = winner.playerId;
        m.homeLabel = winner.label;
      } else {
        m.home = null;
        m.homeLabel = `Winner of ${shortMatchLabel(byId[m.prevHome])}`;
      }
    }
    if (m.prevAway && byId[m.prevAway]) {
      const winner = koWinner(byId[m.prevAway]);
      if (winner) {
        m.away = winner.playerId;
        m.awayLabel = winner.label;
      } else {
        m.away = null;
        m.awayLabel = `Winner of ${shortMatchLabel(byId[m.prevAway])}`;
      }
    }
  }
  // Third place
  if (ko.thirdPlace && ko.thirdPlace.loserOf) {
    const [a, b] = ko.thirdPlace.loserOf.map(id => byId[id]);
    const la = a && koLoser(a);
    const lb = b && koLoser(b);
    ko.thirdPlace.home = la ? la.playerId : null;
    ko.thirdPlace.away = lb ? lb.playerId : null;
    ko.thirdPlace.homeLabel = la ? la.label : 'Loser of SF1';
    ko.thirdPlace.awayLabel = lb ? lb.label : 'Loser of SF2';
  }
}

function shortMatchLabel(m) {
  return `${nameOf(m.home) || m.homeLabel} v ${nameOf(m.away) || m.awayLabel}`;
}

// Aggregate goals for a two-leg tie (m.home perspective / m.away perspective).
function koAggregate(m) {
  return {
    home: (m.homeScore || 0) + (m.l2a || 0),
    away: (m.awayScore || 0) + (m.l2h || 0),
  };
}
function koLegsComplete(m) {
  if (m.legs === 2) return matchPlayed(m) && m.l2h != null && m.l2a != null;
  return matchPlayed(m);
}
// True when the tie is level after normal play and a shootout is required.
function koNeedsShootout(m) {
  if (!m.home || !m.away || !koLegsComplete(m)) return false;
  if (m.legs === 2) { const a = koAggregate(m); return a.home === a.away; }
  return m.homeScore === m.awayScore;
}
function koWinner(m) {
  if (m.home == null && m.away != null) return { playerId: m.away, label: nameOf(m.away) };
  if (m.away == null && m.home != null) return { playerId: m.home, label: nameOf(m.home) };
  const home = { playerId: m.home, label: nameOf(m.home) };
  const away = { playerId: m.away, label: nameOf(m.away) };
  if (!koLegsComplete(m)) return null;
  let hv, av;
  if (m.legs === 2) { const a = koAggregate(m); hv = a.home; av = a.away; }
  else { hv = m.homeScore; av = m.awayScore; }
  if (hv > av) return home;
  if (av > hv) return away;
  // Level -> penalty shootout
  if (m.homePen != null && m.awayPen != null && m.homePen !== m.awayPen) {
    return m.homePen > m.awayPen ? home : away;
  }
  return null;
}
function koLoser(m) {
  const w = koWinner(m);
  if (!w) return null;
  if (w.playerId === m.home) return { playerId: m.away, label: nameOf(m.away) };
  return { playerId: m.home, label: nameOf(m.home) };
}

function nameOf(id) {
  if (!id || !state) return null;
  const p = state.players.find(p => p.id === id);
  return p ? p.name : null;
}
function flagOf(id) {
  if (!id || !state) return DEFAULT_AVATAR;
  const p = state.players.find(p => p.id === id);
  return p ? p.avatar : DEFAULT_AVATAR;
}

/* ---------------- State / persistence ---------------- */
function defaultState() {
  return {
    version: VERSION,
    phase: 'setup',          // 'setup' | 'playing'
    format: 'league',        // 'league' | 'league-ko' | 'groups-ko'
    matchesPerPair: 1,       // 1 or 2
    groupCount: 2,           // for groups-ko
    koSize: 4,               // 2/4/8/16 top-N from league
    koLegs: 1,               // 1 = single match per tie, 2 = home & away on aggregate (final stays single)
    swissRounds: 4,          // swiss: number of rounds to play
    perGroupAdvance: 2,      // groups-ko
    players: [],             // [{id, name, avatar}]
    schedule: { league: [], groupSchedules: [] }, // league: matchdays, groupSchedules: [matchdays per group]
    ko: null,                // { rounds: [[match,...]], thirdPlace }
    settings: { sound: true, theme: 'classic' },
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
}

function saveState() {
  if (!state) return;
  state.updatedAt = Date.now();
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    showSavedPulse();
  } catch (e) {
    console.warn('Save failed', e);
  }
}
function showSavedPulse() {
  const p = document.getElementById('savedPulse');
  if (!p) return;
  p.textContent = '✓ Saved';
  p.classList.remove('show');
  // restart animation by forcing reflow
  void p.offsetWidth;
  p.classList.add('show');
  clearTimeout(p._t);
  p._t = setTimeout(() => p.classList.remove('show'), 1100);
}
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 200);
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed.version !== VERSION) return null;
    return parsed;
  } catch (e) { return null; }
}
function clearState() {
  localStorage.removeItem(STORE_KEY);
}

/* ---------------- Sound ---------------- */
let audioCtx = null;
function getAudio() {
  if (!soundOn) return null;
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playGoal() {
  const ctx = getAudio(); if (!ctx) return;
  const t = ctx.currentTime;
  // Stadium horn: two short blasts, descending
  [0, 0.18].forEach((delay, idx) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(idx === 0 ? 220 : 175, t + delay);
    o.frequency.exponentialRampToValueAtTime(idx === 0 ? 200 : 160, t + delay + 0.15);
    g.gain.setValueAtTime(0, t + delay);
    g.gain.linearRampToValueAtTime(0.18, t + delay + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.16);
    o.connect(g).connect(ctx.destination);
    o.start(t + delay); o.stop(t + delay + 0.18);
  });
}
function playWhistle() {
  const ctx = getAudio(); if (!ctx) return;
  const t = ctx.currentTime;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(2200, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.06, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t + 0.3);
}

/* ---------------- Confetti (inline, no CDN dependency) ---------------- */
function fireConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:1000';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#f59e0b','#22c55e','#3b82f6','#ef4444','#eab308','#a855f7'];
  const parts = [];
  for (let i = 0; i < 180; i++) {
    parts.push({
      x: canvas.width / 2 + (Math.random() - .5) * 80,
      y: canvas.height * 0.35,
      vx: (Math.random() - .5) * 12,
      vy: -Math.random() * 12 - 4,
      g: 0.45,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - .5) * 0.4,
      life: 0,
    });
  }
  let frame = 0;
  function tick() {
    frame++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    parts.forEach(p => {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life++;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
      ctx.restore();
    });
    if (frame < 220) requestAnimationFrame(tick);
    else canvas.remove();
  }
  tick();
}

/* ---------------- Setup screen ---------------- */
function renderSetup() {
  const app = document.getElementById('app');
  clear(app);
  document.getElementById('subTitle').textContent = 'Setup';
  toggleToolbarForSetup();

  // build temp state
  if (!state) state = defaultState();
  state.phase = 'setup';
  if (state.players.length === 0) {
    for (let i = 1; i <= 4; i++) {
      state.players.push({ id: uid(), name: '', avatar: DEFAULT_AVATAR });
    }
  }

  const card = el('div', { class: 'card' });
  card.append(el('h2', {}, 'Configure tournament'));
  card.append(el('p', { class: 'help' }, 'Add players, pick a format, hit Generate. Your progress saves automatically — refresh-proof.'));

  // Number of players
  const playersField = el('div', { class: 'field' });
  playersField.append(el('label', { for: 'numPlayers' }, 'Number of players'));
  const sel = el('select', { id: 'numPlayers' });
  for (let i = 2; i <= 16; i++) sel.append(el('option', { value: String(i), selected: i === state.players.length }, String(i)));
  sel.addEventListener('change', () => {
    const n = parseInt(sel.value);
    while (state.players.length < n) state.players.push({ id: uid(), name: '', avatar: DEFAULT_AVATAR });
    while (state.players.length > n) state.players.pop();
    renderSetup();
  });
  playersField.append(sel);
  card.append(playersField);

  // Format
  const fmtField = el('div', { class: 'field' });
  fmtField.append(el('label', { for: 'format' }, 'Tournament format'));
  const fmtSel = el('select', { id: 'format' });
  [
    ['league', 'League only (round-robin table)'],
    ['league-ko', 'League → Knockout (top X qualify for bracket)'],
    ['groups-ko', 'Groups → Knockout (split into groups, top per group advance)'],
    ['swiss', 'Swiss system (fixed rounds, paired on form, no eliminations)'],
  ].forEach(([v, lbl]) => fmtSel.append(el('option', { value: v, selected: state.format === v }, lbl)));
  fmtSel.addEventListener('change', () => { state.format = fmtSel.value; renderSetup(); });
  fmtField.append(fmtSel);
  card.append(fmtField);

  // Matches per pair
  const mppField = el('div', { class: 'field' });
  mppField.append(el('label', { for: 'mpp' }, 'Matches per pair (group/league stage)'));
  const mppSel = el('select', { id: 'mpp' });
  [[1, '1 (single round-robin)'], [2, '2 (home & away)']].forEach(([v, lbl]) =>
    mppSel.append(el('option', { value: String(v), selected: state.matchesPerPair === v }, lbl))
  );
  mppSel.addEventListener('change', () => { state.matchesPerPair = parseInt(mppSel.value); });
  mppField.append(mppSel);
  card.append(mppField);

  // Groups config (only for groups-ko)
  if (state.format === 'groups-ko') {
    const N = state.players.length;
    const gRow = el('div', { class: 'field-row' });
    const gField = el('div', { class: 'field' });
    gField.append(el('label', { for: 'groups' }, 'Number of groups'));
    const gSel = el('select', { id: 'groups' });
    // Any split where every group has at least 2 players (uneven groups allowed).
    const validGroupCounts = [];
    for (let g = 2; g <= Math.floor(N / 2); g++) validGroupCounts.push(g);
    if (validGroupCounts.length === 0) validGroupCounts.push(1);
    if (!validGroupCounts.includes(state.groupCount)) state.groupCount = validGroupCounts[0];
    validGroupCounts.forEach(g => {
      const base = Math.floor(N / g), rem = N % g;
      const sizeLabel = rem === 0 ? `of ${base}` : `of ${base}–${base + 1}`;
      gSel.append(el('option', { value: String(g), selected: state.groupCount === g }, `${g} groups ${sizeLabel}`));
    });
    gSel.addEventListener('change', () => { state.groupCount = parseInt(gSel.value); renderSetup(); });
    gField.append(gSel);
    gField.append(el('p', { class: 'hint' }, 'Uneven groups are balanced by snake draft.'));
    gRow.append(gField);

    const aField = el('div', { class: 'field' });
    aField.append(el('label', { for: 'adv' }, 'Players advancing per group'));
    const aSel = el('select', { id: 'adv' });
    const smallest = Math.floor(N / state.groupCount); // smallest group size
    if (state.perGroupAdvance >= smallest) state.perGroupAdvance = Math.max(1, smallest - 1);
    for (let a = 1; a < smallest; a++) aSel.append(el('option', { value: String(a), selected: state.perGroupAdvance === a }, String(a)));
    aSel.addEventListener('change', () => { state.perGroupAdvance = parseInt(aSel.value); });
    aField.append(aSel);
    gRow.append(aField);
    card.append(gRow);
  }

  // KO size (for league-ko)
  if (state.format === 'league-ko') {
    const koField = el('div', { class: 'field' });
    koField.append(el('label', { for: 'koSize' }, 'Knockout size (top X from league)'));
    const koSel = el('select', { id: 'koSize' });
    [2, 4, 8, 16].filter(n => n <= state.players.length).forEach(n =>
      koSel.append(el('option', { value: String(n), selected: state.koSize === n }, `Top ${n} → ${n === 2 ? 'Final' : n === 4 ? 'Semi-finals' : n === 8 ? 'Quarter-finals' : 'Round of 16'}`))
    );
    koSel.addEventListener('change', () => { state.koSize = parseInt(koSel.value); });
    if (![2, 4, 8, 16].includes(state.koSize) || state.koSize > state.players.length) {
      const valid = [2, 4, 8, 16].filter(n => n <= state.players.length);
      state.koSize = valid[valid.length - 1] || 2;
      koSel.value = String(state.koSize);
    }
    koField.append(koSel);
    card.append(koField);
  }

  // Swiss rounds
  if (state.format === 'swiss') {
    const N = state.players.length;
    const maxR = Math.max(1, N - 1);
    if (!state.swissRounds || state.swissRounds > maxR) {
      state.swissRounds = Math.min(maxR, Math.max(3, Math.ceil(Math.log2(Math.max(2, N)))));
    }
    const swField = el('div', { class: 'field' });
    swField.append(el('label', { for: 'swissRounds' }, 'Number of rounds'));
    const swSel = el('select', { id: 'swissRounds' });
    for (let r = 1; r <= maxR; r++) swSel.append(el('option', { value: String(r), selected: state.swissRounds === r }, `${r} round${r === 1 ? '' : 's'}`));
    swSel.addEventListener('change', () => { state.swissRounds = parseInt(swSel.value); });
    swField.append(swSel);
    swField.append(el('p', { class: 'hint' }, `Each round pairs players on similar records, avoiding rematches. ${maxR} rounds = everyone plays everyone.`));
    card.append(swField);
  }

  // Knockout legs (any format with a bracket)
  if (state.format === 'league-ko' || state.format === 'groups-ko') {
    const legField = el('div', { class: 'field' });
    legField.append(el('label', { for: 'koLegs' }, 'Knockout legs'));
    const legSel = el('select', { id: 'koLegs' });
    [[1, 'Single leg — one match per tie'], [2, 'Two legs — home & away on aggregate']].forEach(([v, lbl]) =>
      legSel.append(el('option', { value: String(v), selected: (state.koLegs || 1) === v }, lbl))
    );
    legSel.addEventListener('change', () => { state.koLegs = parseInt(legSel.value); });
    legField.append(legSel);
    legField.append(el('p', { class: 'hint' }, 'Two-legged ties are decided on aggregate; the final and 3rd-place match stay single.'));
    card.append(legField);
  }

  // Players list
  const playersSection = el('div', { class: 'field' });
  playersSection.append(el('label', {}, 'Players'));
  playersSection.append(el('p', { class: 'hint' }, 'Drag the ⠿ handle to reorder. In Groups mode the order decides who lands in which group.'));
  const grid = el('div', { class: 'player-grid' });
  state.players.forEach((p, idx) => {
    const row = el('div', { class: 'player-row' });

    const handle = el('span', {
      class: 'drag-handle', draggable: 'true', title: 'Drag to reorder', 'aria-label': 'Drag to reorder player',
    }, '⠿');
    handle.addEventListener('dragstart', e => {
      dragFromIdx = idx;
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(idx)); // Firefox needs data set to start a drag
      try { e.dataTransfer.setDragImage(row, 24, 24); } catch (_) {}
      row.classList.add('dragging');
    });
    handle.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      document.querySelectorAll('.player-row.drag-over').forEach(r => r.classList.remove('drag-over'));
      dragFromIdx = null;
    });
    row.addEventListener('dragover', e => {
      if (dragFromIdx == null || dragFromIdx === idx) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      if (dragFromIdx == null || dragFromIdx === idx) return;
      const [moved] = state.players.splice(dragFromIdx, 1);
      state.players.splice(idx, 0, moved);
      dragFromIdx = null;
      renderSetup();
    });
    row.append(handle);

    row.append(el('span', { class: 'num' }, String(idx + 1)));
    const flagBtn = el('button', { class: 'flag-pick', type: 'button', 'aria-label': 'Pick avatar' }, p.avatar || DEFAULT_AVATAR);
    flagBtn.addEventListener('click', e => openFlagPicker(e.currentTarget, p.id));
    row.append(flagBtn);

    input.addEventListener('input', () => { p.name = input.value; });

  if (loadState()) {

    resumeBtn.addEventListener('click', () => {
      state = loadState();
      state.phase = 'playing';
      saveState();
      renderTournament();
    });
    btnRow.append(resumeBtn);
  }
  card.append(btnRow);

  app.append(card);
}

function openFlagPicker(anchor, playerId) {

function flagPickerOutside(e) {

/* ---------------- Start tournament ---------------- */
function startTournament() {
  // Reset view state so a fresh tournament doesn't inherit stale filters/collapses.
  fixtureFilter = 'all';
  mdExpansionOverrides = new Map();
  // Fill blank names with defaults, then check uniqueness
  state.players.forEach((p, i) => { if (!p.name.trim()) p.name = `Player ${i + 1}`; });
  const nameSet = new Set();
  for (const p of state.players) {
    if (nameSet.has(p.name)) {
      // disambiguate duplicates
      let candidate = p.name, n = 2;
      while (nameSet.has(candidate)) candidate = `${p.name} (${n++})`;
      p.name = candidate;
    }
    nameSet.add(p.name);
  }

  state.schedule = { league: [], groupSchedules: [] };
  state.ko = null;

  if (state.format === 'groups-ko') {
    // Snake draft: balances groups when players are entered in skill order.
    // Row 0: A,B,C,...  Row 1: ...,C,B,A  Row 2: A,B,C,...  etc.
    // For 8 players, 2 groups: A=[0,3,4,7], B=[1,2,5,6].
    const groups = Array.from({ length: state.groupCount }, () => []);
    state.players.forEach((p, i) => {
      const row = Math.floor(i / state.groupCount);
      const col = i % state.groupCount;
      const groupIdx = row % 2 === 0 ? col : (state.groupCount - 1 - col);
      groups[groupIdx].push(p.id);
    });
    state.schedule.groupSchedules = groups.map((g, idx) =>
      ({ tag: groupLetter(idx), playerIds: g, matchdays: generateRoundRobin(g, state.matchesPerPair === 2, groupLetter(idx)) })
    );
  } else if (state.format === 'swiss') {
    // Swiss rounds are generated progressively; create round 1 now.
    state.schedule.league = [];
    generateSwissRound();
  } else {
    const allIds = state.players.map(p => p.id);
    state.schedule.league = generateRoundRobin(allIds, state.matchesPerPair === 2);
  }

  state.phase = 'playing';
  state.createdAt = Date.now();
  activeTab = 'fixtures';
  saveState();
  renderTournament();
}

function groupLetter(i) { return String.fromCharCode(65 + i); /* A, B, C... */ }

/* ---------------- Swiss system ---------------- */
function makeSwissMatch(homeId, awayId) {
  return {
    id: uid(), home: homeId, away: awayId,
    homeScore: null, awayScore: null, homeScorers: '', awayScorers: '',
    locked: false, scorersOpen: false, group: null,
  };
}
function makeByeMatch(playerId) {
  return {
    id: uid(), bye: playerId, home: playerId, away: null,
    homeScore: null, awayScore: null, homeScorers: '', awayScorers: '',
    locked: false, scorersOpen: false, group: null,
  };
}
function swissPlayed() { return state.schedule.league.flat(); }
function swissHaveMet(aId, bId) {
  return swissPlayed().some(m => (m.home === aId && m.away === bId) || (m.home === bId && m.away === aId));
}
function swissHadBye(id) { return swissPlayed().some(m => m.bye === id); }
function swissRoundComplete() {
  const r = state.schedule.league[state.schedule.league.length - 1];
  return !!r && r.every(matchPlayed);
}
function generateSwissRound() {
  // Round 1 uses the (drag-seeded) input order; later rounds sort by current standings.
  let order;
  if (state.schedule.league.length === 0) {
    order = state.players.map(p => p.id);
  } else {
    order = computeTable(state.players, swissPlayed()).map(r => r.id);
  }
  const round = [];
  const used = new Set();

  // Odd count → lowest-ranked player without a previous bye sits out (free win).
  if (order.length % 2 === 1) {
    let byeId = null;
    for (let i = order.length - 1; i >= 0; i--) { if (!swissHadBye(order[i])) { byeId = order[i]; break; } }
    if (byeId == null) byeId = order[order.length - 1];
    used.add(byeId);
    round.push(makeByeMatch(byeId));
  }

  for (let i = 0; i < order.length; i++) {
    const a = order[i];
    if (used.has(a)) continue;
    used.add(a);
    let opp = null;
    // Prefer the nearest-ranked opponent not yet faced.
    for (let j = i + 1; j < order.length; j++) {
      const b = order[j];
      if (used.has(b) || swissHaveMet(a, b)) continue;
      opp = b; break;
    }
    // Fallback: allow a rematch with the nearest available player.
    if (opp == null) {
      for (let j = i + 1; j < order.length; j++) {
        if (!used.has(order[j])) { opp = order[j]; break; }
      }
    }
    if (opp != null) { used.add(opp); round.push(makeSwissMatch(a, opp)); }
  }
  state.schedule.league.push(round);
}

/* ---------------- Tournament view ---------------- */
function renderTournament() {
  const app = document.getElementById('app');
  clear(app);
  document.getElementById('subTitle').textContent =
    state.format === 'league' ? 'League'
    : state.format === 'league-ko' ? 'League + Knockout'
    : state.format === 'swiss' ? 'Swiss'
    : 'Groups + Knockout';
  toggleToolbarForPlaying();

  // Resolve KO from current scores if applicable
  if (state.ko) koResolveBracket(state.ko);

  // Tabs
  const tabs = el('div', { class: 'tabs' });
  const tabDefs = [
    { id: 'fixtures', label: 'Fixtures' },
    { id: 'table', label: state.format === 'groups-ko' ? 'Group tables' : state.format === 'swiss' ? 'Standings' : 'League table' },
  ];
  if (state.format === 'league-ko' || state.format === 'groups-ko') tabDefs.push({ id: 'bracket', label: 'Knockout bracket' });
  tabDefs.push({ id: 'stats', label: 'Stats' });

  const champion = getOverallChampion();
  tabDefs.forEach(t => {
    const tabBtn = el('button', { class: 'tab' + (activeTab === t.id ? ' active' : '') }, t.label);
    tabBtn.addEventListener('click', () => { activeTab = t.id; renderTournament(); });
    tabs.append(tabBtn);
  });
  app.append(tabs);

  if (champion) {
    const banner = el('div', { class: 'champion-banner' });
    banner.append(el('div', { class: 'trophy' }, '🏆'));
    banner.append(el('div', {},
      el('div', { class: 'label' }, 'Champion'),
      el('div', { class: 'name' }, `${champion.avatar}  ${champion.name}`)
    ));
    app.append(banner);
  }

  if (activeTab === 'fixtures') renderFixtures(app);
  else if (activeTab === 'table') renderTables(app);
  else if (activeTab === 'bracket') renderBracket(app);
  else if (activeTab === 'stats') renderStats(app);

  updateNextFab();
}

/* ---------------- Next-unplayed FAB ---------------- */
function findNextUnplayedMatch() {
  if (!state) return null;
  if (state.format === 'groups-ko') {
    for (const g of state.schedule.groupSchedules) {
      for (const md of g.matchdays) {
        for (const m of md) if (m.homeScore == null || m.awayScore == null) return { m, key: locateMdKey(m.id) };
      }
    }
  } else if (state.schedule.league) {
    for (const md of state.schedule.league) {
      for (const m of md) if (m.bye == null && (m.homeScore == null || m.awayScore == null)) return { m, key: locateMdKey(m.id) };
    }
  }
  return null;
}
function locateMdKey(matchId) {
  if (state.format === 'groups-ko') {
    for (const g of state.schedule.groupSchedules) {
      for (let i = 0; i < g.matchdays.length; i++) {
        if (g.matchdays[i].some(x => x.id === matchId)) return `g-${g.tag}-${i}`;
      }
    }
  } else {
    for (let i = 0; i < state.schedule.league.length; i++) {
      if (state.schedule.league[i].some(x => x.id === matchId)) return `l-${i}`;
    }
  }
  return null;
}
function updateNextFab() {
  const fab = document.getElementById('btnNext');
  if (!fab) return;
  const showable = state && state.phase === 'playing' && activeTab === 'fixtures' && findNextUnplayedMatch();
  if (!showable) { fab.classList.remove('show'); fab.onclick = null; return; }
  const { m, key } = showable;
  fab.classList.add('show');
  fab.onclick = () => {
    // If the matchday is collapsed or the filter excludes this match, fix that first.
    let needsRerender = false;
    if (key && mdExpansionOverrides.get(key) === 'collapsed') {
      mdExpansionOverrides.set(key, 'expanded');
      needsRerender = true;
    }
    if (!matchPasses(m)) {
      fixtureFilter = 'all';
      needsRerender = true;
    }
    if (needsRerender) renderTournament();
    requestAnimationFrame(() => {
      const inp = document.querySelector(`input[data-match="${m.id}"][data-side="home"]`);
      if (inp) {
        inp.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => { inp.focus(); inp.select(); }, 380);
      }
    });
  };
}

function renderFixtures(parent) {
  // Filter chip bar
  parent.append(renderFilterChips());

  // First-time keyboard hint (one-time, dismissable)
  if (!localStorage.getItem(HINT_KEY)) parent.append(renderFirstHint());

  let renderedAny = false;
  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(group => {
      const sec = el('div', { class: 'group-section' });
      sec.append(el('h3', {}, `Group ${group.tag}`));
      const before = sec.querySelectorAll('.matchday').length;
      renderMatchdays(sec, group.matchdays, `g-${group.tag}`);
      if (sec.querySelectorAll('.matchday').length > before) {
        renderedAny = true;
        parent.append(sec);
      }
    });
  } else {
    renderMatchdays(parent, state.schedule.league, 'l');
    renderedAny = parent.querySelectorAll('.matchday').length > 0;
  }
  if (!renderedAny) {
    parent.append(el('div', { class: 'empty' }, 'No matches match this filter. Pick "All" to see everything.'));
  }

  // Swiss: progressive round generation
  if (state.format === 'swiss') {
    const generated = state.schedule.league.length;
    if (generated < state.swissRounds) {
      const wrap = el('div', { class: 'swiss-next' });
      if (swissRoundComplete()) {
        wrap.append(el('p', { class: 'help' }, `Round ${generated} complete — ${state.swissRounds - generated} to go. Pairings use the current standings.`));
        const btn = el('button', { class: 'btn primary' }, `Generate round ${generated + 1} →`);
        btn.addEventListener('click', () => { generateSwissRound(); saveState(); renderTournament(); });
        wrap.append(btn);
      } else {
        wrap.append(el('div', { class: 'empty' }, `Finish round ${generated} to unlock the next pairings (Swiss pairs players on form).`));
      }
      parent.append(wrap);
    }
  }
}

function renderFilterChips() {
  const wrap = el('div', { class: 'filter-chips', role: 'group', 'aria-label': 'Filter fixtures' });
  const base = [
    { id: 'all', label: 'All' },
    { id: 'unplayed', label: 'Unplayed' },
    { id: 'played', label: 'Played' },
  ];
  base.forEach(f => wrap.append(makeChip(f.id, f.label)));
  state.players.forEach(p => wrap.append(makeChip('player:' + p.id, `${p.avatar || '⚽'} ${p.name}`)));
  return wrap;
}
function makeChip(id, label) {
  const btn = el('button', {
    class: 'chip' + (fixtureFilter === id ? ' active' : ''),
    type: 'button',
    'aria-pressed': fixtureFilter === id ? 'true' : 'false',
  }, label);
  btn.addEventListener('click', () => {
    fixtureFilter = id;
    renderTournament();
  });
  return btn;
}

function matchPasses(m) {
  if (fixtureFilter === 'all') return true;
  const played = matchPlayed(m);
  if (fixtureFilter === 'played') return played;
  if (fixtureFilter === 'unplayed') return !played;
  if (fixtureFilter.startsWith('player:')) {
    const id = fixtureFilter.slice(7);
    return m.home === id || m.away === id;
  }
  return true;
}

function renderFirstHint() {
  const h = el('div', { class: 'first-hint' });
  h.append(el('span', { class: 'hint-icon', 'aria-hidden': 'true' }, '💡'));
  h.append(el('span', { class: 'hint-text' },
    'Tip: press Tab or Enter to jump to the next score input. Tap a matchday header to collapse it. Use the filter chips to narrow down.'
  ));
  const x = el('button', { class: 'hint-close', type: 'button', 'aria-label': 'Dismiss tip' }, '×');
  x.addEventListener('click', () => {
    localStorage.setItem(HINT_KEY, '1');
    h.remove();
  });
  h.append(x);
  return h;
}

function isMdExpanded(key, allPlayed) {
  const o = mdExpansionOverrides.get(key);
  if (o === 'expanded') return true;
  if (o === 'collapsed') return false;
  return !allPlayed; // default: collapsed if all matches played
}
function toggleMd(key, expand) {
  mdExpansionOverrides.set(key, expand ? 'expanded' : 'collapsed');
}

function renderMatchdays(parent, matchdays, keyPrefix) {
  if (!matchdays || matchdays.length === 0) return;
  matchdays.forEach((md, mdIdx) => {
    const filtered = md.filter(matchPasses);
    if (filtered.length === 0) return;

    const allPlayed = md.every(m => matchPlayed(m));
    const key = `${keyPrefix}-${mdIdx}`;
    const expanded = isMdExpanded(key, allPlayed);

    const block = el('div', { class: 'matchday' });
    const header = el('div', { class: 'matchday-header clickable' + (allPlayed ? ' completed' : '') });
    header.setAttribute('role', 'button');
    header.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    header.setAttribute('tabindex', '0');
    const onToggle = () => { toggleMd(key, !expanded); renderTournament(); };
    header.addEventListener('click', onToggle);
    header.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onToggle(); }
    });

    const titleWrap = el('div', { class: 'md-title-wrap' });
    titleWrap.append(el('span', { class: 'md-caret' + (expanded ? ' open' : ''), 'aria-hidden': 'true' }, '▸'));
    titleWrap.append(el('h3', {}, `${state.format === 'swiss' ? 'Round' : 'Matchday'} ${mdIdx + 1}`));
    if (allPlayed) titleWrap.append(el('span', { class: 'md-done' }, '✓ Complete'));
    header.append(titleWrap);
    const played = md.filter(m => matchPlayed(m)).length;
    header.append(el('div', { class: 'meta' }, `${played}/${md.length} played`));
    block.append(header);

    if (expanded) {
      filtered.forEach(m => block.append(renderMatch(m)));
    }
    parent.append(block);
  });
}

function renderMatch(m) {
  // Swiss bye: a free win, no score entry.
  if (m.bye != null) {
    const w = el('div', { class: 'match bye played' });
    const home = el('div', { class: 'team home' });
    home.append(el('span', { class: 'name' }, nameOf(m.bye) || '—'));
    home.append(el('span', { class: 'flag' }, flagOf(m.bye)));
    w.append(home);
    const center = el('div', { class: 'center' });
    center.append(el('span', { class: 'bye-badge' }, 'Bye · +3'));
    w.append(center);
    w.append(el('div', { class: 'team away' }));
    return w;
  }
  const isPlayed = matchPlayed(m);
  const wrapper = el('div', { class: 'match' + (isPlayed ? ' played' : '') + (m.locked ? ' locked' : '') });
  // Home team
  const home = el('div', { class: 'team home' });
  home.append(el('span', { class: 'name' }, nameOf(m.home) || '—'));
  home.append(el('span', { class: 'flag' }, flagOf(m.home)));
  wrapper.append(home);

  // Center
  const center = el('div', { class: 'center' });
  const scoresRow = el('div', { class: 'scores' });
  const hs = el('input', {
    type: 'number', min: '0', max: '99', inputmode: 'numeric',
    value: m.homeScore != null ? String(m.homeScore) : '',
    'aria-label': `${nameOf(m.home)} score`,
    'data-match': m.id, 'data-side': 'home',
  });
  hs.addEventListener('input', () => onScoreInput(m, 'home', hs.value));
  hs.addEventListener('keydown', e => onScoreKey(e, hs));
  const as = el('input', {
    type: 'number', min: '0', max: '99', inputmode: 'numeric',
    value: m.awayScore != null ? String(m.awayScore) : '',
    'aria-label': `${nameOf(m.away)} score`,
    'data-match': m.id, 'data-side': 'away',
  });
  as.addEventListener('input', () => onScoreInput(m, 'away', as.value));
  as.addEventListener('keydown', e => onScoreKey(e, as));
  scoresRow.append(hs, el('span', { class: 'dash' }, '–'), as);
  center.append(scoresRow);
  // Below row: swap + scorers toggle
  const below = el('div', { class: 'below' });
  const swap = el('button', { class: 'match-action', type: 'button', title: 'Swap home and away', 'aria-label': 'Swap home and away' },
    el('span', { class: 'ico', 'aria-hidden': 'true' }, '⇄'), 'Swap');
  swap.addEventListener('click', () => {
    [m.home, m.away] = [m.away, m.home];
    [m.homeScore, m.awayScore] = [m.awayScore, m.homeScore];
    [m.homeScorers, m.awayScorers] = [m.awayScorers, m.homeScorers];
    scheduleSave(); renderTournament();
  });
  below.append(swap);
  const scorersToggle = el('button', {
    class: 'match-action' + (m.scorersOpen ? ' active' : ''), type: 'button',
    'aria-pressed': m.scorersOpen ? 'true' : 'false',
    title: m.scorersOpen ? 'Hide goalscorers' : 'Add goalscorers',
  }, el('span', { class: 'ico', 'aria-hidden': 'true' }, '⚽'), 'Scorers');
  scorersToggle.addEventListener('click', () => {
    m.scorersOpen = !m.scorersOpen;
    scheduleSave(); renderTournament();
  });
  below.append(scorersToggle);

  // Clear button: visible if any score (even partial) is entered, so user can wipe it.
  const hasAnyScore = m.homeScore != null || m.awayScore != null;
  if (hasAnyScore) {
    const clear = el('button', { class: 'match-action danger', type: 'button', title: 'Clear scores for this match', 'aria-label': 'Clear scores for this match' },
      el('span', { class: 'ico', 'aria-hidden': 'true' }, '✕'), 'Clear');
    clear.addEventListener('click', () => {
      m.homeScore = null;
      m.awayScore = null;
      m.homePen = null;
      m.awayPen = null;
      scheduleSave();
      renderTournament();
    });
    below.append(clear);
  }

  center.append(below);
  wrapper.append(center);

  // Away team
  const away = el('div', { class: 'team away' });
  away.append(el('span', { class: 'flag' }, flagOf(m.away)));
  away.append(el('span', { class: 'name' }, nameOf(m.away) || '—'));
  wrapper.append(away);

  // Scorers row
  if (m.scorersOpen) {
    const sc = el('div', { class: 'scorers-row open' });
    const hCol = el('div', {});
    hCol.append(el('label', {}, `${nameOf(m.home)} goalscorers`));
    const hIn = el('input', {
      type: 'text',
      placeholder: 'e.g. Messi, Ronaldo, Rooney',
      value: m.homeScorers,
      'aria-label': `Goalscorers for ${nameOf(m.home)}`,
    });
    hIn.addEventListener('input', () => { m.homeScorers = hIn.value; scheduleSave(); });
    hCol.append(hIn);
    sc.append(hCol);
    const aCol = el('div', {});
    aCol.append(el('label', {}, `${nameOf(m.away)} goalscorers`));
    const aIn = el('input', {
      type: 'text',
      placeholder: 'e.g. Mbappé, Dembélé, Hakimi',
      value: m.awayScorers,
      'aria-label': `Goalscorers for ${nameOf(m.away)}`,
    });
    aIn.addEventListener('input', () => { m.awayScorers = aIn.value; scheduleSave(); });
    aCol.append(aIn);
    sc.append(aCol);
    wrapper.append(sc);
  }
  return wrapper;
}

let prevPositions = null;
function captureTablePositions() {
  prevPositions = new Map();
  document.querySelectorAll('table.standings tbody tr[data-id]').forEach(tr => {
    prevPositions.set(tr.dataset.id, tr.getBoundingClientRect().top);
  });
}
function playFlip() {
  if (!prevPositions) return;
  document.querySelectorAll('table.standings tbody tr[data-id]').forEach(tr => {
    const prev = prevPositions.get(tr.dataset.id);
    if (prev == null) return;
    const now = tr.getBoundingClientRect().top;
    const dy = prev - now;
    if (dy) {
      tr.animate(
        [{ transform: `translateY(${dy}px)` }, { transform: 'translateY(0)' }],
        { duration: 380, easing: 'cubic-bezier(.2,.8,.2,1)' }
      );
    }
  });
  prevPositions = null;
}

function onScoreInput(m, side, value) {
  if (activeTab === 'table') captureTablePositions();
  const v = value.trim() === '' ? null : Math.max(0, Math.min(99, parseInt(value) || 0));
  const before = side === 'home' ? m.homeScore : m.awayScore;
  if (side === 'home') m.homeScore = v;
  else m.awayScore = v;
  if (v != null && before == null && matchPlayed(m)) playGoal();
  else if (v != null && before != null && v > before) playGoal();
  scheduleSave();

  // Snapshot focus so full re-render doesn't blow away the user's caret.
  const focused = document.activeElement;
  const fMatch = focused && focused.dataset && focused.dataset.match;
  const fSide = focused && focused.dataset && focused.dataset.side;
  const fSelStart = focused && typeof focused.selectionStart === 'number' ? focused.selectionStart : null;
  const fSelEnd = focused && typeof focused.selectionEnd === 'number' ? focused.selectionEnd : null;

  renderTournament();
  if (activeTab === 'table') requestAnimationFrame(playFlip);

  if (fMatch && fSide) {
    const restore = document.querySelector(`input[data-match="${fMatch}"][data-side="${fSide}"]`);
    if (restore) {
      restore.focus();
      if (fSelStart != null) {
        try { restore.setSelectionRange(fSelStart, fSelEnd != null ? fSelEnd : fSelStart); } catch (e) {}
      }
    }
  }
  maybeCelebrate();
}

function onScoreKey(e, input) {
  if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
    const inputs = [...document.querySelectorAll('input[data-match]')];
    const idx = inputs.indexOf(input);
    if (idx >= 0 && idx < inputs.length - 1) {
      e.preventDefault();
      inputs[idx + 1].focus();
      inputs[idx + 1].select();
    }
  }
}

function updateFixtureCounters() {
  if (state.format === 'groups-ko') {
    document.querySelectorAll('.group-section').forEach((sec, gi) => {
      sec.querySelectorAll('.matchday').forEach((mdEl, mi) => {
        const md = state.schedule.groupSchedules[gi].matchdays[mi];
        if (!md) return;
        const played = md.filter(m => matchPlayed(m)).length;
        const meta = mdEl.querySelector('.meta');
        if (meta) meta.textContent = `${played}/${md.length} played`;
      });
    });
  } else {
    document.querySelectorAll('.matchday').forEach((mdEl, mi) => {
      const md = state.schedule.league[mi];
      if (!md) return;
      const played = md.filter(m => matchPlayed(m)).length;
      const meta = mdEl.querySelector('.meta');
      if (meta) meta.textContent = `${played}/${md.length} played`;
    });
  }
}

/* ---------------- League / group tables ---------------- */
function renderTables(parent) {
  parent.append(el('p', { class: 'table-hint' }, '💡 Tip: click any team to open their profile, results and head-to-head.'));
  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(group => {
      const sec = el('div', { class: 'group-section' });
      sec.append(el('h3', {}, `Group ${group.tag}`));
      const players = state.players.filter(p => group.playerIds.includes(p.id));
      const fixtures = group.matchdays.flat();
      sec.append(buildStandingsTable(players, fixtures, state.perGroupAdvance));
      parent.append(sec);
    });
  } else {
    const fixtures = state.schedule.league.flat();
    const qualLine = state.format === 'league-ko' ? state.koSize : 0;
    parent.append(buildStandingsTable(state.players, fixtures, qualLine));
  }
}

function buildStandingsTable(players, fixtures, qualLine) {
  const rows = computeTable(players, fixtures);
  const tbl = el('table', { class: 'standings' });
  const thead = el('thead');
  const trh = el('tr');
  ['Pos', 'Team', 'P', 'W', 'D', 'L', 'GF', 'GA', 'GD', 'Pts', 'Form'].forEach(h =>
    trh.append(el('th', {}, h))
  );
  thead.append(trh);
  tbl.append(thead);

  const tbody = el('tbody');
  rows.forEach((r, idx) => {
    const pos = idx + 1;
    const trClass = (pos <= qualLine ? 'qual ' : '') + 'clickable-row';
    const tr = el('tr', {
      class: trClass, 'data-id': r.id, tabindex: '0', role: 'button',
      title: `View ${r.name}'s profile`,
      onclick: () => openPlayerProfile(r.id),
    });
    tr.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openPlayerProfile(r.id); }
    });
    const posClass = pos === 1 ? 'pos gold' : pos === 2 ? 'pos silver' : pos === 3 ? 'pos bronze' : 'pos';
    const posCell = el('td', { class: posClass });
    if (r.tieNote) {
      const sp = el('span', { class: 'tt', 'data-tip': r.tieNote, tabindex: '0' }, String(pos));
      posCell.append(sp);
    } else {
      posCell.append(document.createTextNode(String(pos)));
    }
    tr.append(posCell);
    const teamCell = el('td', { class: 'team-cell' });
    teamCell.append(el('span', { class: 'flag', style: 'font-size:1.2rem' }, r.avatar || DEFAULT_AVATAR));
    teamCell.append(el('span', {}, r.name));
    tr.append(teamCell);
    tr.append(el('td', {}, String(r.played)));
    tr.append(el('td', {}, String(r.won)));
    tr.append(el('td', {}, String(r.drawn)));
    tr.append(el('td', {}, String(r.lost)));
    tr.append(el('td', {}, String(r.gf)));
    tr.append(el('td', {}, String(r.ga)));
    const gdCell = el('td', { class: r.gd > 0 ? 'gd-plus' : r.gd < 0 ? 'gd-minus' : '' });
    gdCell.textContent = r.gd > 0 ? '+' + r.gd : String(r.gd);
    tr.append(gdCell);
    tr.append(el('td', { class: 'pts' }, String(r.points)));
    // Form (last 5)
    const formCell = el('td', {});
    const formBar = el('span', { class: 'form-bar' });
    r.form.slice(-5).forEach(letter => {
      formBar.append(el('span', { class: `form-pip ${letter}` }, letter));
    });
    formCell.append(formBar);
    tr.append(formCell);
    tbody.append(tr);
  });
  tbl.append(tbody);
  return tbl;
}
