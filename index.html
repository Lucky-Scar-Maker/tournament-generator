/* ---------------- Start tournament ---------------- */
function startTournament() {
  // Reset view state so a fresh tournament doesn't inherit stale filters/collapses.
  fixtureFilter = 'all';
  mdExpansionOverrides = new Map();
  // Fill blank names with defaults, then check uniqueness
  state.players.forEach((p, i) => { if (!p.name.trim()) p.name = `Player ${i + 1}`; });
  const nameSet = new Set();
  for (const p of state.players) {
    if (nameSet.has(p.name)) {
      // disambiguate duplicates
      let candidate = p.name, n = 2;
      while (nameSet.has(candidate)) candidate = `${p.name} (${n++})`;
      p.name = candidate;
    }
    nameSet.add(p.name);
  }

  state.schedule = { league: [], groupSchedules: [] };
  state.ko = null;

  if (state.format === 'groups-ko') {
    // Snake draft: balances groups when players are entered in skill order.
    // Row 0: A,B,C,...  Row 1: ...,C,B,A  Row 2: A,B,C,...  etc.
    // For 8 players, 2 groups: A=[0,3,4,7], B=[1,2,5,6].
    const groups = Array.from({ length: state.groupCount }, () => []);
    state.players.forEach((p, i) => {
      const row = Math.floor(i / state.groupCount);
      const col = i % state.groupCount;
      const groupIdx = row % 2 === 0 ? col : (state.groupCount - 1 - col);
      groups[groupIdx].push(p.id);
    });
    state.schedule.groupSchedules = groups.map((g, idx) =>
      ({ tag: groupLetter(idx), playerIds: g, matchdays: generateRoundRobin(g, state.matchesPerPair === 2, groupLetter(idx)) })
    );
  } else {
    const allIds = state.players.map(p => p.id);
    state.schedule.league = generateRoundRobin(allIds, state.matchesPerPair === 2);
  }

  state.phase = 'playing';
  state.createdAt = Date.now();
  activeTab = 'fixtures';
  saveState();
  renderTournament();
}

function groupLetter(i) { return String.fromCharCode(65 + i); /* A, B, C... */ }

/* ---------------- Tournament view ---------------- */
function renderTournament() {
  const app = document.getElementById('app');
  clear(app);
  document.getElementById('subTitle').textContent =
    state.format === 'league' ? 'League'
    : state.format === 'league-ko' ? 'League + Knockout'
    : 'Groups + Knockout';
  toggleToolbarForPlaying();

  // Resolve KO from current scores if applicable
  if (state.ko) koResolveBracket(state.ko);

  // Tabs
  const tabs = el('div', { class: 'tabs' });
  const tabDefs = [
    { id: 'fixtures', label: 'Fixtures' },
    { id: 'table', label: state.format === 'groups-ko' ? 'Group tables' : 'League table' },
  ];
  if (state.format !== 'league') tabDefs.push({ id: 'bracket', label: 'Knockout bracket' });
  tabDefs.push({ id: 'stats', label: 'Stats' });

  const champion = getOverallChampion();
  tabDefs.forEach(t => {
    const tabBtn = el('button', { class: 'tab' + (activeTab === t.id ? ' active' : '') }, t.label);
    tabBtn.addEventListener('click', () => { activeTab = t.id; renderTournament(); });
    tabs.append(tabBtn);
  });
  app.append(tabs);

  if (champion) {
    const banner = el('div', { class: 'champion-banner' });
    banner.append(el('div', { class: 'trophy' }, '🏆'));
    banner.append(el('div', {},
      el('div', { class: 'label' }, 'Champion'),
      el('div', { class: 'name' }, `${champion.avatar}  ${champion.name}`)
    ));
    app.append(banner);
  }

  if (activeTab === 'fixtures') renderFixtures(app);
  else if (activeTab === 'table') renderTables(app);
  else if (activeTab === 'bracket') renderBracket(app);
  else if (activeTab === 'stats') renderStats(app);

  updateNextFab();
}

/* ---------------- Next-unplayed FAB ---------------- */
function findNextUnplayedMatch() {
  if (!state) return null;
  if (state.format === 'groups-ko') {
    for (const g of state.schedule.groupSchedules) {
      for (const md of g.matchdays) {
        for (const m of md) if (m.homeScore == null || m.awayScore == null) return { m, key: locateMdKey(m.id) };
      }
    }
  } else if (state.schedule.league) {
    for (const md of state.schedule.league) {
      for (const m of md) if (m.homeScore == null || m.awayScore == null) return { m, key: locateMdKey(m.id) };
    }
  }
  return null;
}
function locateMdKey(matchId) {
  if (state.format === 'groups-ko') {
    for (const g of state.schedule.groupSchedules) {
      for (let i = 0; i < g.matchdays.length; i++) {
        if (g.matchdays[i].some(x => x.id === matchId)) return `g-${g.tag}-${i}`;
      }
    }
  } else {
    for (let i = 0; i < state.schedule.league.length; i++) {
      if (state.schedule.league[i].some(x => x.id === matchId)) return `l-${i}`;
    }
  }
  return null;
}
function updateNextFab() {
  const fab = document.getElementById('btnNext');
  if (!fab) return;
  const showable = state && state.phase === 'playing' && activeTab === 'fixtures' && findNextUnplayedMatch();
  if (!showable) { fab.classList.remove('show'); fab.onclick = null; return; }
  const { m, key } = showable;
  fab.classList.add('show');
  fab.onclick = () => {
    // If the matchday is collapsed or the filter excludes this match, fix that first.
    let needsRerender = false;
    if (key && mdExpansionOverrides.get(key) === 'collapsed') {
      mdExpansionOverrides.set(key, 'expanded');
      needsRerender = true;
    }
    if (!matchPasses(m)) {
      fixtureFilter = 'all';
      needsRerender = true;
    }
    if (needsRerender) renderTournament();
    requestAnimationFrame(() => {
      const inp = document.querySelector(`input[data-match="${m.id}"][data-side="home"]`);
      if (inp) {
        inp.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => { inp.focus(); inp.select(); }, 380);
      }
    });
  };
}

function renderFixtures(parent) {
  // Filter chip bar
  parent.append(renderFilterChips());

  // First-time keyboard hint (one-time, dismissable)
  if (!localStorage.getItem(HINT_KEY)) parent.append(renderFirstHint());

  let renderedAny = false;
  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(group => {
      const sec = el('div', { class: 'group-section' });
      sec.append(el('h3', {}, `Group ${group.tag}`));
      const before = sec.querySelectorAll('.matchday').length;
      renderMatchdays(sec, group.matchdays, `g-${group.tag}`);
      if (sec.querySelectorAll('.matchday').length > before) {
        renderedAny = true;
        parent.append(sec);
      }
    });
  } else {
    renderMatchdays(parent, state.schedule.league, 'l');
    renderedAny = parent.querySelectorAll('.matchday').length > 0;
  }
  if (!renderedAny) {
    parent.append(el('div', { class: 'empty' }, 'No matches match this filter. Pick "All" to see everything.'));
  }
}

function renderFilterChips() {
  const wrap = el('div', { class: 'filter-chips', role: 'group', 'aria-label': 'Filter fixtures' });
  const base = [
    { id: 'all', label: 'All' },
    { id: 'unplayed', label: 'Unplayed' },
    { id: 'played', label: 'Played' },
  ];
  base.forEach(f => wrap.append(makeChip(f.id, f.label)));
  state.players.forEach(p => wrap.append(makeChip('player:' + p.id, `${p.avatar || '⚽'} ${p.name}`)));
  return wrap;
}
function makeChip(id, label) {
  const btn = el('button', {
    class: 'chip' + (fixtureFilter === id ? ' active' : ''),
    type: 'button',
    'aria-pressed': fixtureFilter === id ? 'true' : 'false',
  }, label);
  btn.addEventListener('click', () => {
    fixtureFilter = id;
    renderTournament();
  });
  return btn;
}

function matchPasses(m) {
  if (fixtureFilter === 'all') return true;
  const played = m.homeScore != null && m.awayScore != null;
  if (fixtureFilter === 'played') return played;
  if (fixtureFilter === 'unplayed') return !played;
  if (fixtureFilter.startsWith('player:')) {
    const id = fixtureFilter.slice(7);
    return m.home === id || m.away === id;
  }
  return true;
}

function renderFirstHint() {
  const h = el('div', { class: 'first-hint' });
  h.append(el('span', { class: 'hint-icon', 'aria-hidden': 'true' }, '💡'));
  h.append(el('span', { class: 'hint-text' },
    'Tip: press Tab or Enter to jump to the next score input. Tap a matchday header to collapse it. Use the filter chips to narrow down.'
  ));
  const x = el('button', { class: 'hint-close', type: 'button', 'aria-label': 'Dismiss tip' }, '×');
  x.addEventListener('click', () => {
    localStorage.setItem(HINT_KEY, '1');
    h.remove();
  });
  h.append(x);
  return h;
}

function isMdExpanded(key, allPlayed) {
  const o = mdExpansionOverrides.get(key);
  if (o === 'expanded') return true;
  if (o === 'collapsed') return false;
  return !allPlayed; // default: collapsed if all matches played
}
function toggleMd(key, expand) {
  mdExpansionOverrides.set(key, expand ? 'expanded' : 'collapsed');
}

function renderMatchdays(parent, matchdays, keyPrefix) {
  if (!matchdays || matchdays.length === 0) return;
  matchdays.forEach((md, mdIdx) => {
    const filtered = md.filter(matchPasses);
    if (filtered.length === 0) return;

    const allPlayed = md.every(m => m.homeScore != null && m.awayScore != null);
    const key = `${keyPrefix}-${mdIdx}`;
    const expanded = isMdExpanded(key, allPlayed);

    const block = el('div', { class: 'matchday' });
    const header = el('div', { class: 'matchday-header clickable' + (allPlayed ? ' completed' : '') });
    header.setAttribute('role', 'button');
    header.setAttribute('aria-expanded', expanded ? 'true' : 'false');
    header.setAttribute('tabindex', '0');
    const onToggle = () => { toggleMd(key, !expanded); renderTournament(); };
    header.addEventListener('click', onToggle);
    header.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onToggle(); }
    });

    const titleWrap = el('div', { class: 'md-title-wrap' });
    titleWrap.append(el('span', { class: 'md-caret' + (expanded ? ' open' : ''), 'aria-hidden': 'true' }, '▸'));
    titleWrap.append(el('h3', {}, `Matchday ${mdIdx + 1}`));
    if (allPlayed) titleWrap.append(el('span', { class: 'md-done' }, '✓ Complete'));
    header.append(titleWrap);
    const played = md.filter(m => m.homeScore != null && m.awayScore != null).length;
    header.append(el('div', { class: 'meta' }, `${played}/${md.length} played`));
    block.append(header);

    if (expanded) {
      filtered.forEach(m => block.append(renderMatch(m)));
    }
    parent.append(block);
  });
}

function renderMatch(m) {
  const isPlayed = m.homeScore != null && m.awayScore != null;
  const wrapper = el('div', { class: 'match' + (isPlayed ? ' played' : '') + (m.locked ? ' locked' : '') });
  // Home team
  const home = el('div', { class: 'team home' });
  home.append(el('span', { class: 'name' }, nameOf(m.home) || '—'));
  home.append(el('span', { class: 'flag' }, flagOf(m.home)));
  wrapper.append(home);

  // Center
  const center = el('div', { class: 'center' });
  const scoresRow = el('div', { class: 'scores' });
  const hs = el('input', {
    type: 'number', min: '0', max: '99', inputmode: 'numeric',
    value: m.homeScore != null ? String(m.homeScore) : '',
    'aria-label': `${nameOf(m.home)} score`,
    'data-match': m.id, 'data-side': 'home',
  });
  hs.addEventListener('input', () => onScoreInput(m, 'home', hs.value));
  hs.addEventListener('keydown', e => onScoreKey(e, hs));
  const as = el('input', {
    type: 'number', min: '0', max: '99', inputmode: 'numeric',
    value: m.awayScore != null ? String(m.awayScore) : '',
    'aria-label': `${nameOf(m.away)} score`,
    'data-match': m.id, 'data-side': 'away',
  });
  as.addEventListener('input', () => onScoreInput(m, 'away', as.value));
  as.addEventListener('keydown', e => onScoreKey(e, as));
  scoresRow.append(hs, el('span', { class: 'dash' }, '–'), as);
  center.append(scoresRow);
  // Below row: swap + scorers toggle
  const below = el('div', { class: 'below' });
  const swap = el('button', { class: 'swap-btn', type: 'button', 'aria-label': 'Swap home and away' }, '↔ swap');
  swap.addEventListener('click', () => {
    [m.home, m.away] = [m.away, m.home];
    [m.homeScore, m.awayScore] = [m.awayScore, m.homeScore];
    [m.homeScorers, m.awayScorers] = [m.awayScorers, m.homeScorers];
    scheduleSave(); renderTournament();
  });
  below.append(swap);
  const scorersToggle = el('button', { class: 'swap-btn', type: 'button' },
    m.scorersOpen ? '− scorers' : '+ scorers');
  scorersToggle.addEventListener('click', () => {
    m.scorersOpen = !m.scorersOpen;
    scheduleSave(); renderTournament();
  });
  below.append(scorersToggle);

  // Clear button: visible if any score (even partial) is entered, so user can wipe it.
  const hasAnyScore = m.homeScore != null || m.awayScore != null;
  if (hasAnyScore) {
    const clear = el('button', { class: 'swap-btn', type: 'button', 'aria-label': 'Clear scores for this match' }, '× clear');
    clear.addEventListener('click', () => {
      m.homeScore = null;
      m.awayScore = null;
      m.homePen = null;
      m.awayPen = null;
      scheduleSave();
      renderTournament();
    });
    below.append(clear);
  }

  center.append(below);
  wrapper.append(center);

  // Away team
  const away = el('div', { class: 'team away' });
  away.append(el('span', { class: 'flag' }, flagOf(m.away)));
  away.append(el('span', { class: 'name' }, nameOf(m.away) || '—'));
  wrapper.append(away);

  // Scorers row
  if (m.scorersOpen) {
    const sc = el('div', { class: 'scorers-row open' });
    const hCol = el('div', {});
    hCol.append(el('label', {}, `${nameOf(m.home)} goalscorers`));
    const hIn = el('input', {
      type: 'text',
      placeholder: 'e.g. Messi 23, Messi 67, OG',
      value: m.homeScorers,
      'aria-label': `Goalscorers for ${nameOf(m.home)}`,
    });
    hIn.addEventListener('input', () => { m.homeScorers = hIn.value; scheduleSave(); });
    hCol.append(hIn);
    sc.append(hCol);
    const aCol = el('div', {});
    aCol.append(el('label', {}, `${nameOf(m.away)} goalscorers`));
    const aIn = el('input', {
      type: 'text',
      placeholder: 'e.g. Mbappé 12, Vinicius 78',
      value: m.awayScorers,
      'aria-label': `Goalscorers for ${nameOf(m.away)}`,
    });
    aIn.addEventListener('input', () => { m.awayScorers = aIn.value; scheduleSave(); });
    aCol.append(aIn);
    sc.append(aCol);
    wrapper.append(sc);
  }
  return wrapper;
}

let prevPositions = null;
function captureTablePositions() {
  prevPositions = new Map();
  document.querySelectorAll('table.standings tbody tr[data-id]').forEach(tr => {
    prevPositions.set(tr.dataset.id, tr.getBoundingClientRect().top);
  });
}
function playFlip() {
  if (!prevPositions) return;
  document.querySelectorAll('table.standings tbody tr[data-id]').forEach(tr => {
    const prev = prevPositions.get(tr.dataset.id);
    if (prev == null) return;
    const now = tr.getBoundingClientRect().top;
    const dy = prev - now;
    if (dy) {
      tr.animate(
        [{ transform: `translateY(${dy}px)` }, { transform: 'translateY(0)' }],
        { duration: 380, easing: 'cubic-bezier(.2,.8,.2,1)' }
      );
    }
  });
  prevPositions = null;
}

function onScoreInput(m, side, value) {
  if (activeTab === 'table') captureTablePositions();
  const v = value.trim() === '' ? null : Math.max(0, Math.min(99, parseInt(value) || 0));
  const before = side === 'home' ? m.homeScore : m.awayScore;
  if (side === 'home') m.homeScore = v;
  else m.awayScore = v;
  if (v != null && before == null && m.homeScore != null && m.awayScore != null) playGoal();
  else if (v != null && before != null && v > before) playGoal();
  scheduleSave();

  // Snapshot focus so full re-render doesn't blow away the user's caret.
  const focused = document.activeElement;
  const fMatch = focused && focused.dataset && focused.dataset.match;
  const fSide = focused && focused.dataset && focused.dataset.side;
  const fSelStart = focused && typeof focused.selectionStart === 'number' ? focused.selectionStart : null;
  const fSelEnd = focused && typeof focused.selectionEnd === 'number' ? focused.selectionEnd : null;

  renderTournament();
  if (activeTab === 'table') requestAnimationFrame(playFlip);

  if (fMatch && fSide) {
    const restore = document.querySelector(`input[data-match="${fMatch}"][data-side="${fSide}"]`);
    if (restore) {
      restore.focus();
      if (fSelStart != null) {
        try { restore.setSelectionRange(fSelStart, fSelEnd != null ? fSelEnd : fSelStart); } catch (e) {}
      }
    }
  }
  maybeCelebrate();
}

function onScoreKey(e, input) {
  if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
    const inputs = [...document.querySelectorAll('input[data-match]')];
    const idx = inputs.indexOf(input);
    if (idx >= 0 && idx < inputs.length - 1) {
      e.preventDefault();
      inputs[idx + 1].focus();
      inputs[idx + 1].select();
    }
  }
}

function updateFixtureCounters() {
  if (state.format === 'groups-ko') {
    document.querySelectorAll('.group-section').forEach((sec, gi) => {
      sec.querySelectorAll('.matchday').forEach((mdEl, mi) => {
        const md = state.schedule.groupSchedules[gi].matchdays[mi];
        if (!md) return;
        const played = md.filter(m => m.homeScore != null && m.awayScore != null).length;
        const meta = mdEl.querySelector('.meta');
        if (meta) meta.textContent = `${played}/${md.length} played`;
      });
    });
  } else {
    document.querySelectorAll('.matchday').forEach((mdEl, mi) => {
      const md = state.schedule.league[mi];
      if (!md) return;
      const played = md.filter(m => m.homeScore != null && m.awayScore != null).length;
      const meta = mdEl.querySelector('.meta');
      if (meta) meta.textContent = `${played}/${md.length} played`;
    });
  }
}

/* ---------------- League / group tables ---------------- */
function renderTables(parent) {
  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(group => {
      const sec = el('div', { class: 'group-section' });
      sec.append(el('h3', {}, `Group ${group.tag}`));
      const players = state.players.filter(p => group.playerIds.includes(p.id));
      const fixtures = group.matchdays.flat();
      sec.append(buildStandingsTable(players, fixtures, state.perGroupAdvance));
      parent.append(sec);
    });
  } else {
    const fixtures = state.schedule.league.flat();
    const qualLine = state.format === 'league-ko' ? state.koSize : 0;
    parent.append(buildStandingsTable(state.players, fixtures, qualLine));
  }
}

function buildStandingsTable(players, fixtures, qualLine) {
  const rows = computeTable(players, fixtures);
  const tbl = el('table', { class: 'standings' });
  const thead = el('thead');
  const trh = el('tr');
  ['Pos', 'Team', 'P', 'W', 'D', 'L', 'GF', 'GA', 'GD', 'Pts', 'Form'].forEach(h =>
    trh.append(el('th', {}, h))
  );
  thead.append(trh);
  tbl.append(thead);

  const tbody = el('tbody');
  rows.forEach((r, idx) => {
    const pos = idx + 1;
    const trClass = pos <= qualLine ? 'qual' : '';
    const tr = el('tr', { class: trClass, 'data-id': r.id });
    const posClass = pos === 1 ? 'pos gold' : pos === 2 ? 'pos silver' : pos === 3 ? 'pos bronze' : 'pos';
    const posCell = el('td', { class: posClass });
    if (r.tieNote) {
      const sp = el('span', { class: 'tt', 'data-tip': r.tieNote, tabindex: '0' }, String(pos));
      posCell.append(sp);
    } else {
      posCell.append(document.createTextNode(String(pos)));
    }
    tr.append(posCell);
    const teamCell = el('td', { class: 'team-cell' });
    teamCell.append(el('span', { class: 'flag', style: 'font-size:1.2rem' }, r.avatar || DEFAULT_AVATAR));
    teamCell.append(el('span', {}, r.name));
    tr.append(teamCell);
    tr.append(el('td', {}, String(r.played)));
    tr.append(el('td', {}, String(r.won)));
    tr.append(el('td', {}, String(r.drawn)));
    tr.append(el('td', {}, String(r.lost)));
    tr.append(el('td', {}, String(r.gf)));
    tr.append(el('td', {}, String(r.ga)));
    const gdCell = el('td', { class: r.gd > 0 ? 'gd-plus' : r.gd < 0 ? 'gd-minus' : '' });
    gdCell.textContent = r.gd > 0 ? '+' + r.gd : String(r.gd);
    tr.append(gdCell);
    tr.append(el('td', { class: 'pts' }, String(r.points)));
    // Form (last 5)
    const formCell = el('td', {});
    const formBar = el('span', { class: 'form-bar' });
    r.form.slice(-5).forEach(letter => {
      formBar.append(el('span', { class: `form-pip ${letter}` }, letter));
    });
    formCell.append(formBar);
    tr.append(formCell);
    tbody.append(tr);
  });
  tbl.append(tbody);
  return tbl;
}

/* ---------------- Bracket ---------------- */
function renderBracket(parent) {
  if (!state.ko) {
    // Check if league/groups complete to enable bracket
    const ready = isStageComplete();
    if (!ready) {
      parent.append(el('div', { class: 'empty' },
        `Bracket unlocks once the ${state.format === 'groups-ko' ? 'group' : 'league'} stage is complete. Enter all scores to continue.`
      ));
      return;
    }
    const btnWrap = el('div', { class: 'empty' });
    btnWrap.append(el('p', { style: 'margin:0 0 10px' }, `Group stage complete. Build the knockout bracket.`));
    const btn = el('button', { class: 'btn primary' }, 'Generate bracket →');
    btn.addEventListener('click', () => {
      buildBracket();
      renderTournament();
    });
    btnWrap.append(btn);
    parent.append(btnWrap);
    return;
  }

  // Show bracket
  const bracket = el('div', { class: 'bracket' });
  state.ko.rounds.forEach((round, ri) => {
    const col = el('div', { class: 'bracket-round' });
    col.append(el('h4', {}, koRoundLabel(ri, state.ko.rounds.length)));
    round.forEach(m => col.append(renderKoMatch(m)));
    bracket.append(col);
  });
  // Third place column (alongside SF column? we'll put it under finals)
  parent.append(bracket);
  if (state.ko.thirdPlace) {
    const third = el('div', { style: 'max-width:260px;margin-top:14px' });
    third.append(el('h4', { style: 'margin:0 0 8px;text-align:left;font-size:.85rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)' }, 'Third-place playoff'));
    third.append(renderKoMatch(state.ko.thirdPlace));
    parent.append(third);
  }
}

function renderKoMatch(m) {
  const winner = koWinner(m);
  const wrap = el('div', { class: 'ko-match' });
  const homeRow = el('div', { class: 'ko-row' + (winner && winner.playerId === m.home ? ' winner' : winner && m.home ? ' loser' : '') });
  const homeWho = el('div', { class: 'who' });
  if (m.home) {
    homeWho.append(el('span', { class: 'flag' }, flagOf(m.home)));
    homeWho.append(el('span', { class: 'name' }, nameOf(m.home)));
  } else {
    homeWho.append(el('span', { class: 'name ko-tbd' }, m.homeLabel || 'TBD'));
  }
  homeRow.append(homeWho);
  const homeInput = el('input', {
    type: 'number', min: '0', max: '99', inputmode: 'numeric',
    value: m.homeScore != null ? String(m.homeScore) : '',
    'aria-label': 'Home score',
    disabled: !m.home || !m.away ? true : null,
  });
  homeInput.addEventListener('input', () => onKoScore(m, 'home', homeInput.value));
  homeRow.append(homeInput);
  wrap.append(homeRow);
  const awayRow = el('div', { class: 'ko-row' + (winner && winner.playerId === m.away ? ' winner' : winner && m.away ? ' loser' : '') });
  const awayWho = el('div', { class: 'who' });
  if (m.away) {
    awayWho.append(el('span', { class: 'flag' }, flagOf(m.away)));
    awayWho.append(el('span', { class: 'name' }, nameOf(m.away)));
  } else {
    awayWho.append(el('span', { class: 'name ko-tbd' }, m.awayLabel || 'TBD'));
  }
  awayRow.append(awayWho);
  const awayInput = el('input', {
    type: 'number', min: '0', max: '99', inputmode: 'numeric',
    value: m.awayScore != null ? String(m.awayScore) : '',
    'aria-label': 'Away score',
    disabled: !m.home || !m.away ? true : null,
  });
  awayInput.addEventListener('input', () => onKoScore(m, 'away', awayInput.value));
  awayRow.append(awayInput);
  wrap.append(awayRow);

  // Penalty shootout if drawn
  if (m.homeScore != null && m.awayScore != null && m.homeScore === m.awayScore && m.home && m.away) {
    wrap.append(el('div', { class: 'ko-divider' }));
    const penRow = el('div', { class: 'pen-row open' });
    penRow.append(el('span', { class: 'pen-label' }, 'Pens'));
    const hp = el('input', {
      type: 'number', min: '0', max: '99', inputmode: 'numeric',
      value: m.homePen != null ? String(m.homePen) : '',
      'aria-label': 'Home penalties', style: 'width:42px;text-align:center',
    });
    hp.addEventListener('input', () => onKoPen(m, 'home', hp.value));
    const dash = el('span', {}, '–');
    const ap = el('input', {
      type: 'number', min: '0', max: '99', inputmode: 'numeric',
      value: m.awayPen != null ? String(m.awayPen) : '',
      'aria-label': 'Away penalties', style: 'width:42px;text-align:center',
    });
    ap.addEventListener('input', () => onKoPen(m, 'away', ap.value));
    penRow.append(hp, dash, ap);
    wrap.append(penRow);
  }

  if (winner) {
    wrap.append(el('div', { class: 'ko-meta' }, `→ ${winner.label} advances`));
  }
  return wrap;
}

function onKoScore(m, side, value) {
  const v = value.trim() === '' ? null : Math.max(0, Math.min(99, parseInt(value) || 0));
  if (side === 'home') m.homeScore = v; else m.awayScore = v;
  if (m.homeScore != null && m.awayScore != null && m.homeScore !== m.awayScore) {
    m.homePen = null; m.awayPen = null;
  }
  scheduleSave();
  renderTournament();
  maybeCelebrate();
}
function onKoPen(m, side, value) {
  const v = value.trim() === '' ? null : Math.max(0, Math.min(99, parseInt(value) || 0));
  if (side === 'home') m.homePen = v; else m.awayPen = v;
  scheduleSave();
  renderTournament();
  maybeCelebrate();
}

function buildBracket() {
  let seeds;
  if (state.format === 'groups-ko') {
    // Take top N from each group in finishing order. For 2 groups + top 2, cross-pair.
    const groupRows = state.schedule.groupSchedules.map(g => {
      const players = state.players.filter(p => g.playerIds.includes(p.id));
      const fixtures = g.matchdays.flat();
      return { tag: g.tag, table: computeTable(players, fixtures) };
    });
    seeds = [];
    if (state.groupCount === 2 && state.perGroupAdvance === 2) {
      // A1, B1, A2, B2 ordering, with cross-group pairing
      seeds.push({ playerId: groupRows[0].table[0].id, label: `${groupRows[0].tag}1 ${groupRows[0].table[0].name}` });
      seeds.push({ playerId: groupRows[1].table[0].id, label: `${groupRows[1].tag}1 ${groupRows[1].table[0].name}` });
      seeds.push({ playerId: groupRows[0].table[1].id, label: `${groupRows[0].tag}2 ${groupRows[0].table[1].name}` });
      seeds.push({ playerId: groupRows[1].table[1].id, label: `${groupRows[1].tag}2 ${groupRows[1].table[1].name}` });
      state.ko = buildKoBracket(seeds, 'cross-group');
    } else {
      // Generic: interleave (A1, B1, ..., A2, B2, ...)
      for (let pos = 0; pos < state.perGroupAdvance; pos++) {
        groupRows.forEach(gr => {
          if (gr.table[pos]) seeds.push({ playerId: gr.table[pos].id, label: `${gr.tag}${pos + 1} ${gr.table[pos].name}` });
        });
      }
      state.ko = buildKoBracket(seeds, 'standard');
    }
  } else {
    // league-ko: top N from league
    const rows = computeTable(state.players, state.schedule.league.flat());
    seeds = rows.slice(0, state.koSize).map((r, i) => ({ playerId: r.id, label: `${i + 1}. ${r.name}` }));
    state.ko = buildKoBracket(seeds, 'standard');
  }
  saveState();
}

function isStageComplete() {
  if (state.format === 'groups-ko') {
    return state.schedule.groupSchedules.every(g =>
      g.matchdays.flat().every(m => m.homeScore != null && m.awayScore != null)
    );
  } else if (state.format === 'league-ko') {
    return state.schedule.league.flat().every(m => m.homeScore != null && m.awayScore != null);
  }
  return false;
}

function getOverallChampion() {
  if (state.format === 'league') {
    const fixtures = state.schedule.league.flat();
    if (fixtures.length === 0 || !fixtures.every(m => m.homeScore != null && m.awayScore != null)) return null;
    const rows = computeTable(state.players, fixtures);
    return rows[0];
  }
  if (!state.ko) return null;
  const final = state.ko.rounds[state.ko.rounds.length - 1][0];
  const w = koWinner(final);
  if (!w) return null;
  return state.players.find(p => p.id === w.playerId);
}

let lastCelebratedChampionId = null;
function maybeCelebrate() {
  const champ = getOverallChampion();
  if (!champ) return;
  if (champ.id !== lastCelebratedChampionId) {
    lastCelebratedChampionId = champ.id;
    fireConfetti();
    playWhistle();
  }
}

/* ---------------- Stats ---------------- */
function renderStats(parent) {
  const allMatches = collectAllMatches();
  const playedMatches = allMatches.filter(m => m.homeScore != null && m.awayScore != null);
  if (playedMatches.length === 0) {
    parent.append(el('div', { class: 'empty' }, 'Stats appear after the first match is played.'));
    return;
  }

  // Top scorers: parse goalscorers strings, count goals
  const goalCounts = {};
  function addScorers(raw, playerId) {
    if (!raw) return;
    raw.split(/[,;\n]/).forEach(token => {
      const cleaned = token.replace(/\d+/g, '').replace(/[()'"]/g, '').trim();
      if (!cleaned) return;
      if (/^og$/i.test(cleaned)) return;
      const key = cleaned;
      if (!goalCounts[key]) goalCounts[key] = { name: cleaned, byOwner: playerId, goals: 0 };
      goalCounts[key].goals++;
    });
  }
  playedMatches.forEach(m => { addScorers(m.homeScorers, m.home); addScorers(m.awayScorers, m.away); });
  const topScorers = Object.values(goalCounts).sort((a, b) => b.goals - a.goals).slice(0, 8);

  // Biggest win, highest scoring, longest unbeaten run, clean sheets
  let biggest = null;
  let highest = null;
  playedMatches.forEach(m => {
    const gd = Math.abs(m.homeScore - m.awayScore);
    const tot = m.homeScore + m.awayScore;
    if (gd > 0 && (!biggest || gd > biggest.gd)) biggest = { match: m, gd };
    if (!highest || tot > highest.tot) highest = { match: m, tot };
  });

  // Unbeaten runs per player
  const playerMatches = {};
  state.players.forEach(p => playerMatches[p.id] = []);
  playedMatches.forEach(m => {
    playerMatches[m.home].push({ result: m.homeScore > m.awayScore ? 'W' : m.homeScore < m.awayScore ? 'L' : 'D', opp: m.away });
    playerMatches[m.away].push({ result: m.awayScore > m.homeScore ? 'W' : m.awayScore < m.homeScore ? 'L' : 'D', opp: m.home });
  });
  const unbeatenRuns = state.players.map(p => {
    let max = 0, cur = 0;
    playerMatches[p.id].forEach(r => { if (r.result !== 'L') { cur++; max = Math.max(max, cur); } else cur = 0; });
    return { player: p, run: max };
  }).sort((a, b) => b.run - a.run);
  // Clean sheets
  const cleanSheetsPer = state.players.map(p => {
    const cs = playedMatches.filter(m => (m.home === p.id && m.awayScore === 0) || (m.away === p.id && m.homeScore === 0)).length;
    return { player: p, cs };
  }).sort((a, b) => b.cs - a.cs);

  const grid = el('div', { class: 'stat-grid' });

  // Top scorers
  const tsCard = el('div', { class: 'stat-card' });
  tsCard.append(el('h4', {}, 'Top scorers'));
  if (topScorers.length === 0) {
    tsCard.append(el('div', { class: 'help' }, 'Add goalscorers per match (click "+ scorers") to populate this.'));
  } else {
    topScorers.forEach(s => {
      const row = el('div', { class: 'row' });
      row.append(el('span', {}, `${flagOf(s.byOwner)} ${s.name}`));
      row.append(el('span', { class: 'pts' }, `${s.goals} ⚽`));
      tsCard.append(row);
    });
  }
  grid.append(tsCard);

  // Biggest win
  if (biggest) {
    const c = el('div', { class: 'stat-card' });
    c.append(el('h4', {}, 'Biggest win'));
    const m = biggest.match;
    c.append(el('div', { class: 'big' }, `${m.homeScore} – ${m.awayScore}`));
    c.append(el('div', { class: 'help' }, `${nameOf(m.home)} vs ${nameOf(m.away)} (margin: ${biggest.gd})`));
    grid.append(c);
  }
  // Highest scoring
  if (highest) {
    const c = el('div', { class: 'stat-card' });
    c.append(el('h4', {}, 'Highest scoring'));
    const m = highest.match;
    c.append(el('div', { class: 'big' }, `${m.homeScore} – ${m.awayScore}`));
    c.append(el('div', { class: 'help' }, `${nameOf(m.home)} vs ${nameOf(m.away)} (${highest.tot} goals)`));
    grid.append(c);
  }
  // Longest unbeaten
  const ubCard = el('div', { class: 'stat-card' });
  ubCard.append(el('h4', {}, 'Longest unbeaten run'));
  unbeatenRuns.slice(0, 5).forEach(r => {
    const row = el('div', { class: 'row' });
    row.append(el('span', {}, `${r.player.avatar} ${r.player.name}`));
    row.append(el('span', { class: 'pts' }, `${r.run}`));
    ubCard.append(row);
  });
  grid.append(ubCard);
  // Clean sheets
  const csCard = el('div', { class: 'stat-card' });
  csCard.append(el('h4', {}, 'Clean sheets'));
  cleanSheetsPer.slice(0, 5).forEach(r => {
    const row = el('div', { class: 'row' });
    row.append(el('span', {}, `${r.player.avatar} ${r.player.name}`));
    row.append(el('span', { class: 'pts' }, `${r.cs}`));
    csCard.append(row);
  });
  grid.append(csCard);

  parent.append(grid);
}

function collectAllMatches() {
  const list = [];
  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(g => list.push(...g.matchdays.flat()));
  } else {
    list.push(...state.schedule.league.flat());
  }
  // Include KO matches
  if (state.ko) {
    list.push(...state.ko.rounds.flat());
    if (state.ko.thirdPlace) list.push(state.ko.thirdPlace);
  }
  return list;
}

/* ---------------- Toolbar handlers ---------------- */
function toggleToolbarForSetup() {
  ['btnEdit', 'btnShare', 'btnExport', 'btnPrint', 'btnReset'].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.style.display = id === 'btnReset' ? (loadState() ? '' : 'none') : 'none';
  });
  const fab = document.getElementById('btnNext');
  if (fab) fab.classList.remove('show');
}
function toggleToolbarForPlaying() {
  ['btnEdit', 'btnShare', 'btnExport', 'btnPrint', 'btnReset'].forEach(id => {
    const b = document.getElementById(id);
    if (b) b.style.display = '';
  });
}

/* ---------------- Theme toggle ---------------- */
const THEMES = ['stadium', 'arcade', 'news'];
const THEME_LABELS = { stadium: 'Stadium mode', arcade: 'Arcade mode', news: 'Newsroom mode' };
function setTheme(name) {
  if (name === 'pl') name = 'stadium'; // migrate legacy value
  if (!THEMES.includes(name)) name = 'stadium';
  document.documentElement.dataset.theme = name;
  document.querySelectorAll('[data-theme-btn]').forEach(btn => {
    const active = btn.dataset.themeBtn === name;
    btn.classList.toggle('active', active);
    btn.setAttribute('aria-pressed', active ? 'true' : 'false');
  });
  if (state) {
    if (!state.settings) state.settings = {};
    state.settings.theme = name;
    scheduleSave();
  }
}
document.querySelectorAll('[data-theme-btn]').forEach(btn => {
  btn.addEventListener('click', () => {
    setTheme(btn.dataset.themeBtn);
    toast(THEME_LABELS[btn.dataset.themeBtn] || 'Theme changed');
  });
});

document.getElementById('btnSound').addEventListener('click', () => {
  soundOn = !soundOn;
  if (state) state.settings.sound = soundOn;
  document.getElementById('btnSound').textContent = soundOn ? '🔊' : '🔇';
  scheduleSave();
  toast(soundOn ? 'Sound on' : 'Sound muted');
});

document.getElementById('btnEdit').addEventListener('click', () => {
  showModal({
    title: 'Edit players',
    body: () => {
      const wrap = el('div', {});
      wrap.append(el('p', { class: 'help', style: 'margin:0 0 12px' }, 'Rename or change avatars. Tournament data stays intact.'));
      const grid = el('div', { class: 'player-grid' });
      state.players.forEach((p, i) => {
        const row = el('div', { class: 'player-row' });
        row.append(el('span', { class: 'num' }, String(i + 1)));
        const flag = el('button', { class: 'flag-pick', type: 'button' }, p.avatar || DEFAULT_AVATAR);
        flag.addEventListener('click', e => openFlagPicker(e.currentTarget, p.id));
        row.append(flag);
        const inp = el('input', { type: 'text', value: p.name });
        inp.addEventListener('input', () => { p.name = inp.value.trim() || `Player ${i + 1}`; });
        row.append(inp);
        grid.append(row);
      });
      wrap.append(grid);
      return wrap;
    },
    actions: [
      { label: 'Done', primary: true, onClick: () => { closeModal(); scheduleSave(); renderTournament(); } }
    ]
  });
});

document.getElementById('btnShare').addEventListener('click', () => {
  const enc = encodeShare();
  const url = location.origin + location.pathname + '#share=' + enc;
  showModal({
    title: 'Share tournament',
    body: () => {
      const w = el('div', {});
      w.append(el('p', {}, 'Anyone opening this link gets a copy of the current tournament state.'));
      const ta = el('textarea', { readonly: true }, url);
      w.append(ta);
      return w;
    },
    actions: [
      { label: 'Copy link', primary: true, onClick: () => {
        navigator.clipboard.writeText(url).then(
          () => { toast('Link copied'); closeModal(); },
          () => { toast('Copy failed — select and copy manually'); }
        );
      }},
      { label: 'Close', onClick: closeModal }
    ]
  });
});

function encodeShare() {
  try {
    const json = JSON.stringify(state);
    return btoa(unescape(encodeURIComponent(json)));
  } catch (e) { return ''; }
}
function decodeShare(s) {
  try {
    const json = decodeURIComponent(escape(atob(s)));
    return JSON.parse(json);
  } catch (e) { return null; }
}

document.getElementById('btnExport').addEventListener('click', () => {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = el('a', { href: url, download: `fifa-tournament-${Date.now()}.json` });
  document.body.append(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast('Exported JSON');
});

document.getElementById('btnPrint').addEventListener('click', () => window.print());

document.getElementById('btnReset').addEventListener('click', () => {
  showModal({
    title: 'Reset tournament?',
    body: () => el('p', {}, 'This deletes all current scores and players. Cannot be undone.'),
    actions: [
      { label: 'Cancel', onClick: closeModal },
      { label: 'Yes, reset', primary: true, onClick: () => {
        const keepTheme = (state && state.settings && state.settings.theme) || 'stadium';
        clearState();
        lastCelebratedChampionId = null;
        state = defaultState();
        state.settings.theme = keepTheme;
        activeTab = 'fixtures';
        fixtureFilter = 'all';
        mdExpansionOverrides = new Map();
        location.hash = '';
        closeModal();
        setTheme(keepTheme);
        renderSetup();
      }}
    ]
  });
});

/* ---------------- Modal ---------------- */
function showModal({ title, body, actions }) {
  const bg = document.getElementById('modalBg');
  const m = document.getElementById('modal');
  clear(m);
  m.append(el('h3', {}, title));
  const b = typeof body === 'function' ? body() : (body || el('div'));
  m.append(b);
  const a = el('div', { class: 'actions' });
  (actions || []).forEach(act => {
    const btn = el('button', { class: 'btn' + (act.primary ? ' primary' : '') }, act.label);
    btn.addEventListener('click', act.onClick);
    a.append(btn);
  });
  m.append(a);
  bg.classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeFlagPicker();
  }
});

/* ---------------- Init ---------------- */
function init() {
  // Handle share URL
  if (location.hash.startsWith('#share=')) {
    const shared = decodeShare(location.hash.slice(7));
    if (shared && shared.version === VERSION) {
      const existing = loadState();
      if (existing) {
        showModal({
          title: 'Load shared tournament?',
          body: () => el('p', {}, 'This will replace your current tournament. Continue?'),
          actions: [
            { label: 'Cancel', onClick: () => { closeModal(); location.hash = ''; bootFromStorage(); } },
            { label: 'Load shared', primary: true, onClick: () => {
              state = shared; state.phase = 'playing';
              saveState(); closeModal(); location.hash = '';
              renderTournament();
            }}
          ]
        });
        return;
      } else {
        state = shared; state.phase = 'playing';
        saveState(); location.hash = '';
        renderTournament();
        return;
      }
    }
  }
  bootFromStorage();
}
function bootFromStorage() {
  const saved = loadState();
  if (saved && saved.phase === 'playing') {
    state = saved;
    soundOn = state.settings && state.settings.sound !== false;
    document.getElementById('btnSound').textContent = soundOn ? '🔊' : '🔇';
    setTheme((state.settings && state.settings.theme) || 'stadium');
    renderTournament();
  } else {
    state = saved || defaultState();
    setTheme((state.settings && state.settings.theme) || 'stadium');
    renderSetup();
  }
}

init();
</script>
</body>
