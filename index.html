<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tournament Generator</title>
<script>
// Apply saved theme synchronously to prevent flash-of-unstyled-theme on load.
(function () {
  try {
    var raw = localStorage.getItem('fifa-tg-v2');
    var s = raw ? JSON.parse(raw) : null;
    var t = (s && s.settings && s.settings.theme) || 'stadium';
    if (t === 'pl') t = 'stadium'; // migrate legacy value
    if (t !== 'stadium' && t !== 'arcade' && t !== 'news') t = 'stadium';
    document.documentElement.dataset.theme = t;
  } catch (e) { document.documentElement.dataset.theme = 'stadium'; }
})();
</script>
<style>
  :root {
    --bg: #f5f7fb;
    --card: #ffffff;
    --card-2: #fafbfd;
    --border: #e5e7eb;
    --border-strong: #cbd5e1;
    --text: #111827;
    --muted: #6b7280;
    --muted-2: #9ca3af;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #d97706;
    --gold: #eab308;
    --silver: #94a3b8;
    --bronze: #b45309;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, .06);
    --shadow-md: 0 1px 3px rgba(15, 23, 42, .06), 0 4px 14px rgba(15, 23, 42, .07);
    --radius: 10px;
    --radius-lg: 14px;
    --t: 200ms cubic-bezier(.2,.8,.2,1);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1120px; margin: 0 auto; padding: 24px; }
  header.app-header {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
    padding: 18px 24px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: saturate(180%) blur(8px);
  }
  header h1 { font-size: 1.15rem; margin: 0; font-weight: 700; letter-spacing: -.01em; }
  header h1 .sub { color: var(--muted); font-weight: 500; margin-left: 8px; font-size: .92rem; }
  .toolbar { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    appearance: none; border: 1px solid var(--border); background: var(--card);
    color: var(--text); padding: 8px 14px; border-radius: 8px;
    font-size: .92rem; font-weight: 500; cursor: pointer;
    transition: background var(--t), border-color var(--t), transform var(--t);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--card-2); border-color: var(--border-strong); }
  .btn:active { transform: translateY(1px); }
  .btn[disabled] { opacity: .5; cursor: not-allowed; }
  .btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .btn.danger { color: var(--danger); }
  .btn.danger:hover { background: #fef2f2; border-color: #fecaca; }
  .btn.ghost { background: transparent; border-color: transparent; }
  .btn.ghost:hover { background: var(--card-2); }
  .btn.small { padding: 5px 10px; font-size: .85rem; }
  .btn.icon { padding: 6px 8px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 20px;
  }
  .card h2 { margin: 0 0 4px; font-size: 1.1rem; font-weight: 700; }
  .card .help { color: var(--muted); font-size: .9rem; margin: 0 0 18px; }

  .field { margin: 14px 0; }
  .field label { display: block; font-weight: 600; font-size: .9rem; margin-bottom: 6px; }
  .field .hint { color: var(--muted); font-size: .82rem; margin-top: 4px; }
  .field-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .field-row > * { flex: 1; min-width: 180px; }

  select, input[type="text"], input[type="number"] {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font: inherit;
    background: var(--card);
    color: var(--text);
    transition: border-color var(--t), box-shadow var(--t);
  }
  select:focus, input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
  }
  input[type="number"] { text-align: center; -moz-appearance: textfield; appearance: textfield; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
    margin: 12px 0;
  }
  .player-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
  }
  .player-row .num { color: var(--muted); font-size: .8rem; width: 22px; text-align: center; flex-shrink: 0; }
  .player-row .flag-pick {
    width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--border);
    background: white; font-size: 1.4rem; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .player-row input { padding: 7px 9px; }

  .flag-picker-pop {
    position: absolute; z-index: 100;
    background: var(--card); border: 1px solid var(--border-strong);
    border-radius: 10px; padding: 8px; box-shadow: var(--shadow-md);
    max-width: 280px; max-height: 240px; overflow: auto;
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  }
  .flag-picker-pop button {
    width: 32px; height: 32px; border: none; background: transparent;
    border-radius: 6px; font-size: 1.2rem; cursor: pointer;
  }
  .flag-picker-pop button:hover { background: var(--card-2); }

  .tabs {
    display: flex; gap: 4px; margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .tab {
    padding: 10px 16px;
    background: transparent; border: none;
    color: var(--muted); font: inherit; font-weight: 600; font-size: .95rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .badge {
    display: inline-block; margin-left: 6px;
    background: var(--card-2); border: 1px solid var(--border);
    color: var(--muted);
    padding: 1px 7px; border-radius: 999px; font-size: .75rem; font-weight: 600;
  }

  .matchday { margin-bottom: 22px; }
  .matchday-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 14px 0 10px;
    padding: 8px 0 8px 12px;
    border-left: 4px solid var(--accent);
  }
  .matchday-header h3 { margin: 0; font-size: 1rem; font-weight: 700; }
  .matchday-header .meta { color: var(--muted); font-size: .85rem; }

  .match {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    margin: 10px 0;
    transition: border-color var(--t), background var(--t);
  }
  .match.locked { background: var(--card-2); }
  .match.played { border-color: #c7e2cc; }
  .match .team {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600;
    min-width: 0;
  }
  .match .team .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .match .team .flag { font-size: 1.4rem; flex-shrink: 0; }
  .match .team.home { justify-content: flex-end; text-align: right; }
  .match .team.away { justify-content: flex-start; }
  .match .center {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    min-width: 120px;
  }
  .match .scores { display: flex; align-items: center; gap: 6px; }
  .match .scores input {
    width: 48px; padding: 6px; font-weight: 700; font-size: 1rem;
  }
  .match .scores .dash { color: var(--muted); font-weight: 700; }
  .match .below {
    display: flex; gap: 6px; align-items: center;
    font-size: .78rem; color: var(--muted);
  }
  .match .swap-btn {
    background: none; border: none; color: var(--muted-2); cursor: pointer;
    font-size: .85rem; padding: 2px 4px; border-radius: 4px;
  }
  .match .swap-btn:hover { color: var(--text); background: var(--card-2); }
  .scorers-row {
    grid-column: 1 / -1;
    display: none;
    padding: 8px 0 0;
    border-top: 1px dashed var(--border);
    margin-top: 8px;
  }
  .scorers-row.open { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .scorers-row label { font-size: .8rem; color: var(--muted); font-weight: 500; }
  .scorers-row input { font-size: .9rem; padding: 6px 8px; }
  .pen-row { grid-column: 1 / -1; display: none; padding: 8px 0 0; }
  .pen-row.open { display: flex; gap: 10px; align-items: center; justify-content: center; }
  .pen-row .pen-label { font-size: .8rem; color: var(--muted); font-weight: 600; }

  table.standings {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    background: var(--card);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  table.standings th, table.standings td {
    padding: 12px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    font-size: .92rem;
  }
  table.standings th {
    background: var(--card-2);
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    font-size: .72rem;
    letter-spacing: .04em;
  }
  table.standings tbody tr { transition: background var(--t); }
  table.standings tbody tr:hover { background: var(--card-2); }
  table.standings td.team-cell {
    text-align: left;
    font-weight: 600;
    padding-left: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  table.standings .pos { font-weight: 700; color: var(--muted); width: 36px; }
  table.standings .pos.gold { color: var(--gold); }
  table.standings .pos.silver { color: var(--silver); }
  table.standings .pos.bronze { color: var(--bronze); }
  table.standings .qual { border-left: 3px solid var(--success); }
  table.standings .qual-out { opacity: .85; }
  .gd-plus { color: var(--success); font-weight: 600; }
  .gd-minus { color: var(--danger); font-weight: 600; }
  .pts { font-weight: 700; }
  .form-bar { display: inline-flex; gap: 3px; margin-left: 6px; }
  .form-pip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 4px;
    font-size: .65rem; font-weight: 700; color: white;
    line-height: 1;
  }
  .form-pip.W { background: var(--success); }
  .form-pip.D { background: var(--muted-2); }
  .form-pip.L { background: var(--danger); }

  .tt {
    position: relative; cursor: help;
    border-bottom: 1px dotted var(--muted-2);
  }
  .tt:hover::after, .tt:focus::after {
    content: attr(data-tip);
    position: absolute; left: 50%; bottom: calc(100% + 6px); transform: translateX(-50%);
    background: #111827; color: white; padding: 6px 10px; border-radius: 6px;
    font-size: .78rem; white-space: pre; z-index: 10;
    box-shadow: var(--shadow-md);
  }

  /* Knockout bracket */
  .bracket {
    display: flex;
    gap: 30px;
    overflow-x: auto;
    padding: 8px 4px 20px;
  }
  .bracket-round {
    display: flex; flex-direction: column;
    justify-content: space-around;
    gap: 16px;
    min-width: 240px;
    flex-shrink: 0;
  }
  .bracket-round h4 {
    margin: 0; text-align: center; font-size: .85rem; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted);
  }
  .ko-match {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    box-shadow: var(--shadow-sm);
  }
  .ko-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 4px 0;
  }
  .ko-row.winner { font-weight: 700; }
  .ko-row.loser { opacity: .55; }
  .ko-row .who { display: flex; align-items: center; gap: 6px; min-width: 0; }
  .ko-row .who .flag { flex-shrink: 0; }
  .ko-row .who .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ko-row input { width: 42px; padding: 4px; text-align: center; font-weight: 700; }
  .ko-divider { height: 1px; background: var(--border); margin: 4px -12px; }
  .ko-meta { font-size: .72rem; color: var(--muted); margin-top: 6px; text-align: center; }
  .ko-tbd { color: var(--muted-2); font-style: italic; }

  .stat-grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px;
  }
  .stat-card h4 { margin: 0 0 10px; font-size: .9rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em; }
  .stat-card .big { font-size: 1.4rem; font-weight: 800; }
  .stat-card .row { display: flex; justify-content: space-between; padding: 4px 0; font-size: .92rem; }
  .stat-card .row + .row { border-top: 1px dashed var(--border); }
  .stat-card .row .label { color: var(--muted); }

  .group-section { margin-bottom: 24px; }
  .group-section h3 {
    margin: 0 0 8px; font-size: .9rem; text-transform: uppercase; letter-spacing: .04em;
    color: var(--muted);
  }

  .empty {
    color: var(--muted); text-align: center; padding: 30px;
    border: 1px dashed var(--border); border-radius: var(--radius-lg);
    background: var(--card);
  }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #111827; color: white; padding: 10px 16px; border-radius: 999px;
    font-size: .9rem; opacity: 0; transition: opacity var(--t), transform var(--t);
    pointer-events: none; z-index: 200;
    box-shadow: var(--shadow-md);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(15,23,42,.45);
    display: none; align-items: center; justify-content: center; z-index: 300;
    padding: 16px;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--card); border-radius: var(--radius-lg);
    max-width: 480px; width: 100%; padding: 22px;
    box-shadow: var(--shadow-md);
  }
  .modal h3 { margin: 0 0 8px; }
  .modal p { color: var(--muted); margin: 0 0 16px; }
  .modal .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal textarea {
    width: 100%; min-height: 100px; font-family: ui-monospace, monospace; font-size: .85rem;
    padding: 8px; border: 1px solid var(--border); border-radius: 8px;
  }

  .champion-banner {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border: 1px solid #fbbf24;
    color: #78350f;
    border-radius: var(--radius-lg);
    padding: 18px 22px;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .champion-banner .trophy { font-size: 2.2rem; }
  .champion-banner .name { font-size: 1.3rem; font-weight: 800; }
  .champion-banner .label { font-size: .85rem; text-transform: uppercase; letter-spacing: .06em; opacity: .8; }

  /* ============================================================
     v3 additions: filter chips, FAB, saved-pulse, hint, collapsible matchdays
     ============================================================ */
  .filter-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 16px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .chip {
    appearance: none;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    border-radius: 999px;
    font: inherit;
    font-size: .82rem;
    font-weight: 500;
    cursor: pointer;
    transition: background var(--t), border-color var(--t), color var(--t);
  }
  .chip:hover { background: var(--card-2); border-color: var(--border-strong); }
  .chip.active { background: var(--accent); color: white; border-color: var(--accent); }

  .matchday-header.clickable { cursor: pointer; user-select: none; border-radius: 6px; transition: background var(--t); }
  .matchday-header.clickable:hover { background: var(--card-2); }
  .matchday-header.completed { opacity: .82; }
  .md-title-wrap { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .md-caret {
    display: inline-block;
    color: var(--muted-2);
    font-size: .85rem;
    transition: transform 160ms cubic-bezier(.2,.8,.2,1);
  }
  .md-caret.open { transform: rotate(90deg); }
  .md-done {
    font-size: .7rem; color: var(--success);
    font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
    background: rgba(22,163,74,.1);
    padding: 2px 7px; border-radius: 999px;
  }

  .next-fab {
    position: fixed; bottom: 22px; right: 22px;
    z-index: 80;
    background: var(--accent); color: white;
    border: none; padding: 13px 22px; border-radius: 999px;
    font: inherit; font-size: .92rem; font-weight: 600;
    cursor: pointer;
    box-shadow: 0 8px 22px rgba(0,0,0,.25);
    display: none;
    transition: transform var(--t), box-shadow var(--t), background var(--t);
  }
  .next-fab.show { display: inline-flex; align-items: center; gap: 6px; animation: fabIn 260ms cubic-bezier(.2,.8,.2,1); }
  .next-fab:hover { transform: translateY(-2px); background: var(--accent-hover); box-shadow: 0 12px 28px rgba(0,0,0,.32); }
  @keyframes fabIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .saved-pulse {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--success);
    color: white;
    font-size: .7rem;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    vertical-align: middle;
  }
  .saved-pulse.show { animation: savedPulse 1000ms ease-out; }
  @keyframes savedPulse {
    0% { opacity: 0; transform: scale(.85); }
    18% { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1); }
  }

  .first-hint {
    display: flex; align-items: center; gap: 10px;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    font-size: .88rem;
    color: var(--text);
  }
  .hint-icon { font-size: 1rem; flex-shrink: 0; }
  .hint-text { flex: 1; }
  .hint-close {
    background: none; border: none;
    font-size: 1.3rem; color: var(--muted);
    cursor: pointer; padding: 0 8px;
    line-height: 1; border-radius: 6px;
  }
  .hint-close:hover { color: var(--text); background: var(--card); }

  /* Slightly bigger touch targets for swap / scorers / clear */
  .match .swap-btn {
    padding: 5px 9px;
    font-size: .85rem;
    min-height: 28px;
    border-radius: 6px;
  }

  /* v3 overrides — Stadium */
  html[data-theme="stadium"] .filter-chips { border-bottom-color: rgba(255,255,255,.3); }
  html[data-theme="stadium"] .chip { background: rgba(0,0,0,.4); color: #fff; border-color: rgba(255,255,255,.5); }
  html[data-theme="stadium"] .chip:hover { background: rgba(0,0,0,.6); border-color: #fff; }
  html[data-theme="stadium"] .chip.active { background: #fbbf24; color: #0c5d2f; border-color: #fbbf24; }
  html[data-theme="stadium"] .matchday-header.clickable:hover { background: rgba(255,255,255,.06); }
  html[data-theme="stadium"] .md-done { background: rgba(251,191,36,.18); color: #fbbf24; border: 1px solid #fbbf24; }
  html[data-theme="stadium"] .next-fab { background: #fbbf24; color: #0c5d2f; border: 2px solid #fff; }
  html[data-theme="stadium"] .next-fab:hover { background: #f59e0b; color: #0c5d2f; }
  html[data-theme="stadium"] .saved-pulse { background: #fbbf24; color: #0c5d2f; }
  html[data-theme="stadium"] .first-hint {
    background: rgba(0,0,0,.45); color: #fff;
    border-color: rgba(255,255,255,.4);
  }
  html[data-theme="stadium"] .hint-close { color: rgba(255,255,255,.75); }
  html[data-theme="stadium"] .hint-close:hover { color: #fff; background: rgba(255,255,255,.15); }

  /* v3 overrides — Newsroom */
  html[data-theme="news"] .filter-chips { border-bottom: 1px solid #2a241b; }
  html[data-theme="news"] .chip {
    background: #fbf4dc; color: #2a241b;
    border: 1px solid #c8bfa5; border-radius: 0;
    font-family: var(--font-sans); font-size: .8rem;
  }
  html[data-theme="news"] .chip:hover { background: #f0e6c3; border-color: #2a241b; }
  html[data-theme="news"] .chip.active { background: #2a241b; color: #fbf4dc; border-color: #2a241b; }
  html[data-theme="news"] .matchday-header.clickable:hover { background: rgba(42,36,27,.04); }
  html[data-theme="news"] .md-done {

  /* ============================================================
     Theme system — segmented toggle + scoped overrides
     Default = "pl" (Broadcast). Toggle in header switches to "arcade".
     ============================================================ */
  .theme-toggle {
    display: inline-flex;
    background: var(--card-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px;
    margin-right: 4px;
    transition: background var(--t), border-color var(--t);
  }
  .theme-toggle .seg {
    appearance: none;
    background: transparent;
    border: none;
    padding: 5px 11px;
    border-radius: 999px;
    font: inherit;
    font-size: .82rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: background var(--t), color var(--t);
  }
  .theme-toggle .seg.active {
    background: var(--card);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }
  .theme-toggle .seg:hover:not(.active) { color: var(--text); }

<script>
/* ============================================================
   Tournament Generator — v2 rewrite
   Single-file vanilla. No build step.

   Engine:
   - Circle-method round-robin (proper matchdays, n-1 per cycle)
   - Optional double round (home & away)
   - Head-to-head tiebreaker (pairwise; falls back to GD/GF)
   - Knockout bracket seeding (League+KO, Groups+KO)
   - Stable player IDs so duplicate names don't corrupt the table
   - localStorage autosave + URL-hash share links
   ============================================================ */

const STORE_KEY = 'fifa-tg-v2';
const VERSION = 2;

const FLAGS = [
  '⚽','🏆','🥅','🎯','🔥','⭐',
  '🇦🇷','🇧🇷','🇩🇪','🇫🇷','🇮🇹','🇪🇸','🇬🇧','🏴󠁧󠁢󠁥󠁮󠁧󠁿','🏴󠁧󠁢󠁳󠁣󠁴󠁿','🏴󠁧󠁢󠁷󠁬󠁳󠁿',
  '🇵🇹','🇳🇱','🇧🇪','🇭🇷','🇩🇰','🇸🇪','🇳🇴','🇨🇭','🇦🇹','🇵🇱',
  '🇺🇸','🇲🇽','🇨🇦','🇨🇴','🇨🇱','🇺🇾','🇪🇨','🇯🇵','🇰🇷','🇦🇺',
  '🇸🇦','🇲🇦','🇸🇳','🇨🇲','🇳🇬','🇪🇬','🇬🇭','🇨🇮','🇿🇦','🇹🇷',
  '🇮🇪','🇮🇸','🇨🇿','🇸🇰','🇭🇺','🇷🇸','🇬🇷','🇺🇦','🇷🇺','🇷🇴',
];

const DEFAULT_AVATAR = '⚽';

let state = null;       // current tournament state
let activeTab = 'fixtures';
let pendingFlag = null; // id of player whose flag picker is open
let saveTimer = null;
let soundOn = true;
let fixtureFilter = 'all';   // 'all' | 'unplayed' | 'played' | 'player:<id>'
let mdExpansionOverrides = new Map(); // matchday key -> 'expanded' | 'collapsed'

const HINT_KEY = 'fifa-tg-v2-hint-dismissed';

/* ---------------- Utilities ---------------- */
function uid() { return Math.random().toString(36).slice(2, 9); }
function deepClone(o) { return JSON.parse(JSON.stringify(o)); }
function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k === 'html') node.innerHTML = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else if (v === false || v == null) continue;
    else if (v === true) node.setAttribute(k, '');
    else node.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null || c === false) continue;
    node.append(c instanceof Node ? c : document.createTextNode(String(c)));
  }
  return node;
}
function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg, ms = 2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), ms);
}

/* ---------------- Round-robin (circle method) ----------------
   For n players, produces n-1 matchdays of n/2 matches each.
   If n is odd, one player gets a bye per matchday.
   home/away alternates roughly. Players can swap home/away per match
   from the UI if they want.
*/
function generateRoundRobin(playerIds, doubleRound = false, groupTag = null) {
  let teams = playerIds.slice();
  const hasBye = teams.length % 2 !== 0;
  if (hasBye) teams.push(null);
  const n = teams.length;
  if (n < 2) return [];

  const matchdays = [];
  let arr = teams.slice();

  for (let r = 0; r < n - 1; r++) {
    const md = [];
    for (let i = 0; i < n / 2; i++) {
      const a = arr[i];
      const b = arr[n - 1 - i];
      if (a === null || b === null) continue;
      // Simple alternation: roughly balances who appears as "home"
      const aHome = (r + i) % 2 === 0;
      md.push({
        id: uid(),
        home: aHome ? a : b,
        away: aHome ? b : a,
        homeScore: null,
        awayScore: null,
        homeScorers: '',
        awayScorers: '',
        locked: false,
        scorersOpen: false,
        group: groupTag,
      });
    }
    matchdays.push(md);
    // Rotate: fix position 0, rotate positions 1..n-1 by moving last to position 1
    arr = [arr[0], arr[n - 1], ...arr.slice(1, n - 1)];
  }

  if (doubleRound) {
    const reverse = matchdays.map(md =>
      md.map(m => ({
        ...m, id: uid(),
        home: m.away, away: m.home,
        homeScore: null, awayScore: null,
        homeScorers: '', awayScorers: '',
        locked: false, scorersOpen: false,
      }))
    );
    return matchdays.concat(reverse);
  }
  return matchdays;
}

/* ---------------- Standings ---------------- */
function emptyRow(p) {
  return { id: p.id, name: p.name, avatar: p.avatar,
    played: 0, won: 0, drawn: 0, lost: 0,
    gf: 0, ga: 0, gd: 0, points: 0,
    form: [],          // ordered "W"/"D"/"L"
    cleanSheets: 0,
    goalsConceded: 0,
  };
}

function applyResult(rows, byId, m) {
  if (m.homeScore == null || m.awayScore == null) return;
  const hi = byId[m.home], ai = byId[m.away];
  const h = rows[hi], a = rows[ai];
  h.played++; a.played++;
  h.gf += m.homeScore; h.ga += m.awayScore;
  a.gf += m.awayScore; a.ga += m.homeScore;
  h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
  if (m.awayScore === 0) h.cleanSheets++;
  if (m.homeScore === 0) a.cleanSheets++;
  if (m.homeScore > m.awayScore) {
    h.won++; h.points += 3; a.lost++;
    h.form.push('W'); a.form.push('L');
  } else if (m.homeScore < m.awayScore) {
    a.won++; a.points += 3; h.lost++;
    a.form.push('W'); h.form.push('L');
  } else {
    h.drawn++; a.drawn++; h.points++; a.points++;
    h.form.push('D'); a.form.push('D');
  }
}

function computeTable(players, fixtures) {
  const rows = players.map(emptyRow);
  const byId = {};
  players.forEach((p, i) => byId[p.id] = i);
  fixtures.forEach(m => applyResult(rows, byId, m));

  // Sort with head-to-head as second-level tiebreaker.
  // Algorithm: group teams by points → within each group, run a mini h2h table
  // (pairwise points among that group only), sort by (h2h pts → h2h gd → overall gd → overall gf).
  // For two-team ties this is just direct h2h. For 3+ ties it's a mini-league.
  rows.sort((a, b) => b.points - a.points);

  const final = [];
  let i = 0;
  while (i < rows.length) {
    let j = i;
    while (j + 1 < rows.length && rows[j + 1].points === rows[i].points) j++;
    if (j === i) { final.push({ ...rows[i], tieNote: null }); i++; continue; }

    // Tied group rows[i..j]
    const group = rows.slice(i, j + 1);
    const groupIds = new Set(group.map(r => r.id));
    const h2h = {};
    group.forEach(r => h2h[r.id] = { pts: 0, gd: 0, gf: 0 });
    fixtures.forEach(m => {
      if (m.homeScore == null || m.awayScore == null) return;
      if (!groupIds.has(m.home) || !groupIds.has(m.away)) return;
      const H = h2h[m.home], A = h2h[m.away];
      H.gf += m.homeScore; A.gf += m.awayScore;
      H.gd += m.homeScore - m.awayScore;
      A.gd += m.awayScore - m.homeScore;
      if (m.homeScore > m.awayScore) H.pts += 3;
      else if (m.homeScore < m.awayScore) A.pts += 3;
      else { H.pts++; A.pts++; }
    });
    group.sort((a, b) => {
      const A = h2h[a.id], B = h2h[b.id];
      if (B.pts !== A.pts) return B.pts - A.pts;
      if (B.gd !== A.gd) return B.gd - A.gd;
      if (b.gd !== a.gd) return b.gd - a.gd;
      if (b.gf !== a.gf) return b.gf - a.gf;
      return a.name.localeCompare(b.name);
    });
    group.forEach((row, idxInGroup) => {
      let tieNote = null;
      if (group.length > 1) {
        const A = h2h[row.id];
        tieNote = `Tied on ${row.points} pts. H2H: ${A.pts} pts, GD ${A.gd >= 0 ? '+' + A.gd : A.gd}. Then overall GD ${row.gd >= 0 ? '+' + row.gd : row.gd}, GF ${row.gf}.`;
      }
      final.push({ ...row, tieNote });
    });
    i = j + 1;
  }
  return final;
}

/* ---------------- Knockout bracket ---------------- */
// Standard single-elimination seeding: 1 vs N, 2 vs N-1, then bracketed so #1 and #2 only meet in the final.
function seedKnockout(seedsInOrder) {
  // seedsInOrder = [{playerId, label}], 1st seed first
  const n = seedsInOrder.length;
  if (n < 2 || (n & (n - 1)) !== 0) {
    // pad to next power of 2 with null (= bye)
    let target = 1; while (target < n) target *= 2;
    while (seedsInOrder.length < target) seedsInOrder.push(null);
  }
  const N = seedsInOrder.length;
  // Build bracket order so that seed pairs interleave correctly
  // Standard pairing positions: e.g. for 8: [1,8,4,5,2,7,3,6]
  function bracketOrder(size) {
    let order = [1, 2];
    while (order.length < size) {
      const next = [];
      const sum = order.length * 2 + 1;
      for (const s of order) { next.push(s); next.push(sum - s); }
      order = next;
    }
    return order;
  }
  const order = bracketOrder(N);
  return order.map(rank => seedsInOrder[rank - 1] || null);
}

function buildKoBracket(seedsInOrder, type) {
  // type: 'standard' or 'cross-group'
  let positions;
  if (type === 'cross-group') {
    // Special: groups+KO with top 2 from 2 groups → SF: A1 vs B2, B1 vs A2
    // expects seedsInOrder = [A1, B1, A2, B2] for 4-team, or longer for more groups.
    // For 2 groups top 2: A1 vs B2, B1 vs A2.
    if (seedsInOrder.length === 4) {
      positions = [seedsInOrder[0], seedsInOrder[3], seedsInOrder[1], seedsInOrder[2]];
    } else {
      // Fallback to standard
      positions = seedKnockout(seedsInOrder.slice());
    }
  } else {
    positions = seedKnockout(seedsInOrder.slice());
  }

  // Build rounds: round 0 = first round, each subsequent round halves
  const rounds = [];
  let firstRound = [];
  for (let i = 0; i < positions.length; i += 2) {
    firstRound.push({
      id: uid(),
      home: positions[i] ? positions[i].playerId : null,
      away: positions[i + 1] ? positions[i + 1].playerId : null,
      homeLabel: positions[i] ? positions[i].label : 'BYE',
      awayLabel: positions[i + 1] ? positions[i + 1].label : 'BYE',
      homeScore: null, awayScore: null,
      homePen: null, awayPen: null,
      penOpen: false,
    });
  }
  rounds.push(firstRound);
  while (rounds[rounds.length - 1].length > 1) {
    const prev = rounds[rounds.length - 1];
    const next = [];
    for (let i = 0; i < prev.length; i += 2) {
      next.push({
        id: uid(),
        home: null, away: null,
        homeLabel: `Winner of ${i + 1}`, awayLabel: `Winner of ${i + 2}`,
        homeScore: null, awayScore: null,
        homePen: null, awayPen: null,
        penOpen: false,
        prevHome: prev[i].id,
        prevAway: prev[i + 1].id,
      });
    }
    rounds.push(next);
  }

  // Third place playoff: losers of penultimate round
  let thirdPlace = null;
  if (rounds.length >= 2) {
    const sf = rounds[rounds.length - 2];
    if (sf.length === 2) {
      thirdPlace = {
        id: uid(),
        home: null, away: null,
        homeLabel: 'Loser of SF1', awayLabel: 'Loser of SF2',
        homeScore: null, awayScore: null,
        homePen: null, awayPen: null,
        penOpen: false,
        loserOf: [sf[0].id, sf[1].id],
      };
    }
  }
  return { rounds, thirdPlace };
}

function koRoundLabel(roundIdx, totalRounds) {
  const fromEnd = totalRounds - 1 - roundIdx;
  if (fromEnd === 0) return 'Final';
  if (fromEnd === 1) return 'Semi-Finals';
  if (fromEnd === 2) return 'Quarter-Finals';
  if (fromEnd === 3) return 'Round of 16';
  return `Round ${roundIdx + 1}`;
}

function koResolveBracket(ko) {
  // Propagate winners through the bracket based on completed scores.
  if (!ko) return;
  const matches = ko.rounds.flat();
  const byId = {};
  matches.forEach(m => byId[m.id] = m);

  for (const m of matches) {
    if (m.prevHome && byId[m.prevHome]) {
      const winner = koWinner(byId[m.prevHome]);
      if (winner) {
        m.home = winner.playerId;
        m.homeLabel = winner.label;
      } else {
        m.home = null;
        m.homeLabel = `Winner of ${shortMatchLabel(byId[m.prevHome])}`;
      }
    }
    if (m.prevAway && byId[m.prevAway]) {
      const winner = koWinner(byId[m.prevAway]);
      if (winner) {
        m.away = winner.playerId;
        m.awayLabel = winner.label;
      } else {
        m.away = null;
        m.awayLabel = `Winner of ${shortMatchLabel(byId[m.prevAway])}`;
      }
    }
  }
  // Third place
  if (ko.thirdPlace && ko.thirdPlace.loserOf) {
    const [a, b] = ko.thirdPlace.loserOf.map(id => byId[id]);
    const la = a && koLoser(a);
    const lb = b && koLoser(b);
    ko.thirdPlace.home = la ? la.playerId : null;
    ko.thirdPlace.away = lb ? lb.playerId : null;
    ko.thirdPlace.homeLabel = la ? la.label : 'Loser of SF1';
    ko.thirdPlace.awayLabel = lb ? lb.label : 'Loser of SF2';
  }
}

function shortMatchLabel(m) {
  return `${nameOf(m.home) || m.homeLabel} v ${nameOf(m.away) || m.awayLabel}`;
}

function koWinner(m) {
  if (m.home == null && m.away != null) return { playerId: m.away, label: nameOf(m.away) };
  if (m.away == null && m.home != null) return { playerId: m.home, label: nameOf(m.home) };
  if (m.homeScore == null || m.awayScore == null) return null;
  if (m.homeScore > m.awayScore) return { playerId: m.home, label: nameOf(m.home) };
  if (m.awayScore > m.homeScore) return { playerId: m.away, label: nameOf(m.away) };
  // Draw -> penalty shootout
  if (m.homePen != null && m.awayPen != null && m.homePen !== m.awayPen) {
    if (m.homePen > m.awayPen) return { playerId: m.home, label: nameOf(m.home) };
    return { playerId: m.away, label: nameOf(m.away) };
  }
  return null;
}
function koLoser(m) {
  const w = koWinner(m);
  if (!w) return null;
  if (w.playerId === m.home) return { playerId: m.away, label: nameOf(m.away) };
  return { playerId: m.home, label: nameOf(m.home) };
}

function nameOf(id) {
  if (!id || !state) return null;
  const p = state.players.find(p => p.id === id);
  return p ? p.name : null;
}
function flagOf(id) {
  if (!id || !state) return DEFAULT_AVATAR;
  const p = state.players.find(p => p.id === id);
  return p ? p.avatar : DEFAULT_AVATAR;
}

/* ---------------- State / persistence ---------------- */
function defaultState() {
  return {
    version: VERSION,
    phase: 'setup',          // 'setup' | 'playing'
    format: 'league',        // 'league' | 'league-ko' | 'groups-ko'
    matchesPerPair: 1,       // 1 or 2
    groupCount: 2,           // for groups-ko
    koSize: 4,               // 2/4/8/16 top-N from league
    perGroupAdvance: 2,      // groups-ko
    players: [],             // [{id, name, avatar}]
    schedule: { league: [], groupSchedules: [] }, // league: matchdays, groupSchedules: [matchdays per group]
    ko: null,                // { rounds: [[match,...]], thirdPlace }
    settings: { sound: true, theme: 'stadium' },
    createdAt: Date.now(),
    updatedAt: Date.now(),
  };
}

function saveState() {
  if (!state) return;
  state.updatedAt = Date.now();
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(state));
    showSavedPulse();
  } catch (e) {
    console.warn('Save failed', e);
  }
}
function showSavedPulse() {
  const p = document.getElementById('savedPulse');
  if (!p) return;
  p.textContent = '✓ Saved';
  p.classList.remove('show');
  // restart animation by forcing reflow
  void p.offsetWidth;
  p.classList.add('show');
  clearTimeout(p._t);
  p._t = setTimeout(() => p.classList.remove('show'), 1100);
}
function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 200);
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (parsed.version !== VERSION) return null;
    return parsed;
  } catch (e) { return null; }
}
function clearState() {
  localStorage.removeItem(STORE_KEY);
}

/* ---------------- Sound ---------------- */
let audioCtx = null;
function getAudio() {
  if (!soundOn) return null;
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playGoal() {
  const ctx = getAudio(); if (!ctx) return;
  const t = ctx.currentTime;
  // Stadium horn: two short blasts, descending
  [0, 0.18].forEach((delay, idx) => {
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(idx === 0 ? 220 : 175, t + delay);
    o.frequency.exponentialRampToValueAtTime(idx === 0 ? 200 : 160, t + delay + 0.15);
    g.gain.setValueAtTime(0, t + delay);
    g.gain.linearRampToValueAtTime(0.18, t + delay + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.16);
    o.connect(g).connect(ctx.destination);
    o.start(t + delay); o.stop(t + delay + 0.18);
  });
}
function playWhistle() {
  const ctx = getAudio(); if (!ctx) return;
  const t = ctx.currentTime;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(2200, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.06, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t + 0.3);
}

/* ---------------- Confetti (inline, no CDN dependency) ---------------- */
function fireConfetti() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:1000';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#f59e0b','#22c55e','#3b82f6','#ef4444','#eab308','#a855f7'];
  const parts = [];
  for (let i = 0; i < 180; i++) {
    parts.push({
      x: canvas.width / 2 + (Math.random() - .5) * 80,
      y: canvas.height * 0.35,
      vx: (Math.random() - .5) * 12,
      vy: -Math.random() * 12 - 4,
      g: 0.45,
      size: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - .5) * 0.4,
      life: 0,
    });
  }
  let frame = 0;
  function tick() {
    frame++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    parts.forEach(p => {
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr; p.life++;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size * 0.6);
      ctx.restore();
    });
    if (frame < 220) requestAnimationFrame(tick);
    else canvas.remove();
  }
  tick();
}

function openFlagPicker(anchor, playerId) {
