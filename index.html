function makeLegRow(m, tag, hostId, guestId, hostField, guestField, disabled) {
  const row = el('div', { class: 'ko-leg' });
  row.append(el('span', { class: 'leg-tag' }, tag));
  row.append(el('span', { class: 'flag' }, flagOf(hostId)));
  const hi = el('input', {
    type: 'number', min: '0', max: '99', inputmode: 'numeric',
    value: m[hostField] != null ? String(m[hostField]) : '',
    'aria-label': `${tag} ${nameOf(hostId) || 'home'} score`, disabled: disabled ? true : null,
  });
  hi.addEventListener('input', () => onKoField(m, hostField, hi.value));
  row.append(hi);
  row.append(el('span', { class: 'leg-dash' }, '–'));
  const gi = el('input', {
    type: 'number', min: '0', max: '99', inputmode: 'numeric',
    value: m[guestField] != null ? String(m[guestField]) : '',
    'aria-label': `${tag} ${nameOf(guestId) || 'away'} score`, disabled: disabled ? true : null,
  });
  gi.addEventListener('input', () => onKoField(m, guestField, gi.value));
  row.append(gi);
  row.append(el('span', { class: 'flag' }, flagOf(guestId)));
  return row;
}

function renderKoMatch(m) {
  const winner = koWinner(m);
  const twoLeg = m.legs === 2 && m.home && m.away;
  const wrap = el('div', { class: 'ko-match' });

  let agg = { home: 0, away: 0 }, aggAny = false;
  if (twoLeg) {
    agg = koAggregate(m);
    aggAny = [m.homeScore, m.awayScore, m.l2h, m.l2a].some(x => x != null);
  }

  function sideRow(isHome) {
    const id = isHome ? m.home : m.away;
    const label = isHome ? m.homeLabel : m.awayLabel;
    const row = el('div', { class: 'ko-row' + (winner && winner.playerId === id ? ' winner' : winner && id ? ' loser' : '') });
    const who = el('div', { class: 'who' });
    if (id) {
      who.append(el('span', { class: 'flag' }, flagOf(id)));
      who.append(el('span', { class: 'name' }, nameOf(id)));
    } else {
      who.append(el('span', { class: 'name ko-tbd' }, label || 'TBD'));
    }
    row.append(who);
    if (twoLeg) {
      row.append(el('span', { class: 'ko-agg' }, aggAny ? String(isHome ? agg.home : agg.away) : '–'));
    } else {
      const field = isHome ? 'homeScore' : 'awayScore';
      const input = el('input', {
        type: 'number', min: '0', max: '99', inputmode: 'numeric',
        value: m[field] != null ? String(m[field]) : '',
        'aria-label': (isHome ? 'Home' : 'Away') + ' score',
        disabled: !m.home || !m.away ? true : null,
      });
      input.addEventListener('input', () => onKoField(m, field, input.value));
      row.append(input);
    }
    return row;
  }

  wrap.append(sideRow(true));
  wrap.append(sideRow(false));

  // Two-leg score entry: leg 1 (home hosts), leg 2 (away hosts)
  if (twoLeg) {
    const legs = el('div', { class: 'ko-legs' });
    legs.append(makeLegRow(m, 'L1', m.home, m.away, 'homeScore', 'awayScore', false));
    legs.append(makeLegRow(m, 'L2', m.away, m.home, 'l2h', 'l2a', false));
    wrap.append(legs);
  }

  // Penalty shootout when level after normal play
  if (koNeedsShootout(m)) {
    wrap.append(el('div', { class: 'ko-divider' }));
    const penRow = el('div', { class: 'pen-row open' });
    penRow.append(el('span', { class: 'pen-label' }, 'Pens'));
    const hp = el('input', {
      type: 'number', min: '0', max: '99', inputmode: 'numeric',
      value: m.homePen != null ? String(m.homePen) : '',
      'aria-label': 'Home penalties', style: 'width:42px;text-align:center',
    });
    hp.addEventListener('input', () => onKoPen(m, 'home', hp.value));
    const ap = el('input', {
      type: 'number', min: '0', max: '99', inputmode: 'numeric',
      value: m.awayPen != null ? String(m.awayPen) : '',
      'aria-label': 'Away penalties', style: 'width:42px;text-align:center',
    });
    ap.addEventListener('input', () => onKoPen(m, 'away', ap.value));
    penRow.append(hp, el('span', {}, '–'), ap);
    wrap.append(penRow);
  }

  if (winner) {
    let meta = `→ ${winner.label} advances`;
    if (twoLeg && aggAny) {
      const wAgg = winner.playerId === m.home ? agg.home : agg.away;
      const lAgg = winner.playerId === m.home ? agg.away : agg.home;
      meta += ` (agg ${wAgg}–${lAgg})`;
    }
    wrap.append(el('div', { class: 'ko-meta' }, meta));
  }
  return wrap;
}

function onKoField(m, field, value) {
  const v = value.trim() === '' ? null : Math.max(0, Math.min(99, parseInt(value) || 0));
  m[field] = v;
  // Drop any stale shootout once the tie is no longer level (or no longer complete).
  if (!koNeedsShootout(m)) { m.homePen = null; m.awayPen = null; }
  scheduleSave();
  renderTournament();
  maybeCelebrate();
}
function onKoPen(m, side, value) {
  const v = value.trim() === '' ? null : Math.max(0, Math.min(99, parseInt(value) || 0));
  if (side === 'home') m.homePen = v; else m.awayPen = v;
  scheduleSave();
  renderTournament();
  maybeCelebrate();
}

function buildBracket() {
  let seeds;
  if (state.format === 'groups-ko') {
    // Take top N from each group in finishing order. For 2 groups + top 2, cross-pair.
    const groupRows = state.schedule.groupSchedules.map(g => {
      const players = state.players.filter(p => g.playerIds.includes(p.id));
      const fixtures = g.matchdays.flat();
      return { tag: g.tag, table: computeTable(players, fixtures) };
    });
    seeds = [];
    if (state.groupCount === 2 && state.perGroupAdvance === 2) {
      // A1, B1, A2, B2 ordering, with cross-group pairing
      seeds.push({ playerId: groupRows[0].table[0].id, label: `${groupRows[0].tag}1 ${groupRows[0].table[0].name}` });
      seeds.push({ playerId: groupRows[1].table[0].id, label: `${groupRows[1].tag}1 ${groupRows[1].table[0].name}` });
      seeds.push({ playerId: groupRows[0].table[1].id, label: `${groupRows[0].tag}2 ${groupRows[0].table[1].name}` });
      seeds.push({ playerId: groupRows[1].table[1].id, label: `${groupRows[1].tag}2 ${groupRows[1].table[1].name}` });
      state.ko = buildKoBracket(seeds, 'cross-group');
    } else {
      // Generic: interleave (A1, B1, ..., A2, B2, ...)
      for (let pos = 0; pos < state.perGroupAdvance; pos++) {
        groupRows.forEach(gr => {
          if (gr.table[pos]) seeds.push({ playerId: gr.table[pos].id, label: `${gr.tag}${pos + 1} ${gr.table[pos].name}` });
        });
      }
      state.ko = buildKoBracket(seeds, 'standard');
    }
  } else {
    // league-ko: top N from league
    const rows = computeTable(state.players, state.schedule.league.flat());
    seeds = rows.slice(0, state.koSize).map((r, i) => ({ playerId: r.id, label: `${i + 1}. ${r.name}` }));
    state.ko = buildKoBracket(seeds, 'standard');
  }
  saveState();
}

function isStageComplete() {
  if (state.format === 'groups-ko') {
    return state.schedule.groupSchedules.every(g =>
      g.matchdays.flat().every(m => matchPlayed(m))
    );
  } else if (state.format === 'league-ko') {
    return state.schedule.league.flat().every(m => matchPlayed(m));
  }
  return false;
}

function getOverallChampion() {
  if (state.format === 'league' || state.format === 'swiss') {
    // Swiss is only decided once every round has been generated and played.
    if (state.format === 'swiss' && state.schedule.league.length < state.swissRounds) return null;
    const fixtures = state.schedule.league.flat();
    if (fixtures.length === 0 || !fixtures.every(m => matchPlayed(m))) return null;
    const rows = computeTable(state.players, fixtures);
    return rows[0];
  }
  if (!state.ko) return null;
  const final = state.ko.rounds[state.ko.rounds.length - 1][0];
  const w = koWinner(final);
  if (!w) return null;
  return state.players.find(p => p.id === w.playerId);
}

let lastCelebratedChampionId = null;
function maybeCelebrate() {
  const champ = getOverallChampion();
  if (!champ) return;
  if (champ.id !== lastCelebratedChampionId) {
    lastCelebratedChampionId = champ.id;
    fireConfetti();
    playWhistle();
  }
}

/* ---------------- Data & insights helpers ---------------- */
const PALETTE = ['#4f46e5','#0ea5e9','#16a34a','#f59e0b','#e11d48','#a855f7','#0d9488','#db2777','#65a30d','#ea580c','#2563eb','#7c3aed','#059669','#d97706','#dc2626','#0891b2'];
function playerColor(id) {
  const i = state.players.findIndex(p => p.id === id);
  return PALETTE[(i < 0 ? 0 : i) % PALETTE.length];
}
const SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
  const n = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}

// Cumulative points per matchday (index 0 = before any matchday).
function buildPointsProgression(players, matchdays) {
  const series = {};
  players.forEach(p => series[p.id] = [0]);
  matchdays.forEach(md => {
    const gained = {};
    players.forEach(p => gained[p.id] = 0);
    md.forEach(m => {
      if (m.bye != null) { if (m.bye in gained) gained[m.bye] += 3; return; }
      if (m.homeScore == null || m.awayScore == null) return;
      if (!(m.home in gained) || !(m.away in gained)) return;
      if (m.homeScore > m.awayScore) gained[m.home] += 3;
      else if (m.homeScore < m.awayScore) gained[m.away] += 3;
      else { gained[m.home] += 1; gained[m.away] += 1; }
    });
    players.forEach(p => {
      const arr = series[p.id];
      arr.push(arr[arr.length - 1] + gained[p.id]);
    });
  });
  return players.map(p => ({ id: p.id, name: p.name, avatar: p.avatar, color: playerColor(p.id), points: series[p.id] }));
}

function renderPointsChart(players, matchdays, titleText) {
  const card = el('div', { class: 'chart-card stat-card' });
  card.append(el('h4', {}, titleText || 'Points progression'));
  let lastPlayed = 0;
  matchdays.forEach((md, i) => { if (md.some(m => matchPlayed(m))) lastPlayed = i + 1; });
  if (lastPlayed === 0) {
    card.append(el('div', { class: 'help' }, 'The race chart fills in as results are entered.'));
    return card;
  }
  const series = buildPointsProgression(players, matchdays.slice(0, lastPlayed));
  const xN = lastPlayed;
  const maxPts = Math.max(3, ...series.map(s => s.points[s.points.length - 1]));
  const W = 720, H = 320, padL = 34, padR = 16, padT = 14, padB = 26;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const x = i => padL + (i / xN) * plotW;
  const y = v => padT + plotH - (v / maxPts) * plotH;

  const svg = svgEl('svg', { viewBox: `0 0 ${W} ${H}`, class: 'pp-chart', role: 'img',
    'aria-label': (titleText || 'Points progression') + ' chart' });

  const step = maxPts <= 6 ? 1 : maxPts <= 15 ? 3 : Math.ceil(maxPts / 6);
  for (let v = 0; v <= maxPts; v += step) {
    svg.appendChild(svgEl('line', { x1: padL, y1: y(v), x2: W - padR, y2: y(v), class: 'pp-grid' }));
    const t = svgEl('text', { x: padL - 6, y: y(v) + 4, class: 'pp-label', 'text-anchor': 'end' });
    t.textContent = String(v);
    svg.appendChild(t);
  }
  const xStep = Math.max(1, Math.ceil(xN / 12));
  for (let i = 0; i <= xN; i++) {
    if (i !== 0 && i !== xN && i % xStep !== 0) continue;
    const t = svgEl('text', { x: x(i), y: H - 8, class: 'pp-label', 'text-anchor': 'middle' });
    t.textContent = String(i);
    svg.appendChild(t);
  }
  series.forEach(s => {
    let d = '';
    s.points.forEach((v, i) => { d += (i === 0 ? 'M' : 'L') + x(i).toFixed(1) + ' ' + y(v).toFixed(1) + ' '; });
    svg.appendChild(svgEl('path', { d: d.trim(), class: 'pp-line', stroke: s.color }));
    const li = s.points.length - 1;
    svg.appendChild(svgEl('circle', { cx: x(li), cy: y(s.points[li]), r: 3.5, class: 'pp-dot', fill: s.color }));
  });
  card.append(svg);

  const legend = el('div', { class: 'chart-legend' });
  series.slice().sort((a, b) => b.points[b.points.length - 1] - a.points[a.points.length - 1]).forEach(s => {
    const item = el('div', { class: 'legend-item' });
    item.append(el('span', { class: 'legend-swatch', style: `background:${s.color}` }));
    const fp = s.points[s.points.length - 1];
    item.append(document.createTextNode(`${s.avatar || ''} ${s.name} · ${fp} pt${fp === 1 ? '' : 's'}`));
    legend.append(item);
  });
  card.append(legend);
  return card;
}

// All completed matches involving a player, oldest first, with stage + perspective.
function gatherPlayerMatches(playerId) {
  const out = [];
  function push(m, stage) {
    if (m.home !== playerId && m.away !== playerId) return;
    const isHome = m.home === playerId;
    const oppId = isHome ? m.away : m.home;
    // Aggregate for two-leg ties, single score otherwise.
    let gf, ga;
    if (m.legs === 2) {
      if (!koLegsComplete(m)) return;
      const a = koAggregate(m);
      gf = isHome ? a.home : a.away;
      ga = isHome ? a.away : a.home;
    } else {
      if (m.homeScore == null || m.awayScore == null) return;
      gf = isHome ? m.homeScore : m.awayScore;
      ga = isHome ? m.awayScore : m.homeScore;
    }
    let result = gf > ga ? 'W' : gf < ga ? 'L' : 'D';
    let pens = null;
    if (gf === ga && m.homePen != null && m.awayPen != null) {
      const pf = isHome ? m.homePen : m.awayPen, pa = isHome ? m.awayPen : m.homePen;
      pens = `${pf}–${pa} pens`;
      result = pf > pa ? 'W' : pf < pa ? 'L' : 'D';
    }
    out.push({ oppId, oppName: nameOf(oppId) || '—', oppAvatar: flagOf(oppId), gf, ga, result, stage, pens });
  }
  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(g => g.matchdays.flat().forEach(m => push(m, 'Group ' + g.tag)));
  } else {
    state.schedule.league.flat().forEach(m => push(m, 'League'));
  }
  if (state.ko) {
    state.ko.rounds.forEach((round, ri) => round.forEach(m => push(m, koRoundLabel(ri, state.ko.rounds.length))));
    if (state.ko.thirdPlace) push(state.ko.thirdPlace, '3rd place');
  }
  return out;
}

function headToHead(playerId) {
  const byOpp = {};
  gatherPlayerMatches(playerId).forEach(r => {
    if (!byOpp[r.oppId]) byOpp[r.oppId] = { oppId: r.oppId, name: r.oppName, avatar: r.oppAvatar, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 };
    const o = byOpp[r.oppId];
    o.p++; o.gf += r.gf; o.ga += r.ga;
    if (r.result === 'W') o.w++; else if (r.result === 'L') o.l++; else o.d++;
  });
  return Object.values(byOpp);
}

function openPlayerProfile(playerId) {
  const p = state.players.find(x => x.id === playerId);
  if (!p) return;
  const matches = gatherPlayerMatches(playerId);
  const agg = matches.reduce((a, r) => {
    a.p++; a.gf += r.gf; a.ga += r.ga;
    if (r.result === 'W') a.w++; else if (r.result === 'L') a.l++; else a.d++;
    return a;
  }, { p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 });
  const gd = agg.gf - agg.ga;
  const pts = agg.w * 3 + agg.d;
  const cs = matches.filter(r => r.ga === 0).length;
  const h2h = headToHead(playerId).sort((a, b) => b.p - a.p);

  showModal({
    wide: true,
    title: 'Player profile',
    body: () => {
      const wrap = el('div', {});
      const head = el('div', { class: 'profile-head' });
      head.append(el('span', { class: 'pf-avatar' }, p.avatar || DEFAULT_AVATAR));
      const ht = el('div', {});
      ht.append(el('div', { class: 'pf-name' }, p.name));
      ht.append(el('div', { class: 'pf-sub' }, `${agg.p} match${agg.p === 1 ? '' : 'es'} played`));
      head.append(ht);
      wrap.append(head);

      const sg = el('div', { class: 'pf-statgrid' });
      const stat = (v, k, cls) => {
        const d = el('div', { class: 'pf-stat' });
        d.append(el('div', { class: 'v' + (cls ? ' ' + cls : '') }, v));
        d.append(el('div', { class: 'k' }, k));
        return d;
      };
      sg.append(stat(String(pts), 'Points'));
      sg.append(stat(`${agg.w}-${agg.d}-${agg.l}`, 'W-D-L'));
      sg.append(stat(`${agg.gf}:${agg.ga}`, 'GF:GA'));
      sg.append(stat((gd > 0 ? '+' : '') + gd, 'GD', gd > 0 ? 'gd-plus' : gd < 0 ? 'gd-minus' : ''));
      sg.append(stat(String(cs), 'Clean sheets'));
      wrap.append(sg);

      if (matches.length) {
        wrap.append(el('div', { class: 'pf-section-title' }, 'Recent form'));
        const fb = el('span', { class: 'form-bar' });
        matches.slice(-8).forEach(r => fb.append(el('span', { class: 'form-pip ' + r.result }, r.result)));
        wrap.append(fb);
      }

      wrap.append(el('div', { class: 'pf-section-title' }, 'Results'));
      if (!matches.length) {
        wrap.append(el('div', { class: 'help' }, 'No completed matches yet.'));
      } else {
        const list = el('div', { class: 'results-list' });
        matches.slice().reverse().forEach(r => {
          const row = el('div', { class: 'result-row' });
          row.append(el('span', { class: 'rr-badge ' + r.result }, r.result));
          row.append(el('span', { class: 'rr-opp' }, `${r.oppAvatar} ${r.oppName}  ·  ${r.stage}`));
          row.append(el('span', { class: 'rr-score' }, `${r.gf}–${r.ga}` + (r.pens ? ` (${r.pens})` : '')));
          list.append(row);
        });
        wrap.append(list);
      }

      if (h2h.length) {
        wrap.append(el('div', { class: 'pf-section-title' }, 'Head-to-head'));
        const list = el('div', { class: 'results-list' });
        h2h.forEach(o => {
          const row = el('div', { class: 'result-row' });
          row.append(el('span', {}, o.avatar));
          row.append(el('span', { class: 'rr-opp' }, `${o.name}  ·  ${o.p} played`));
          row.append(el('span', { class: 'rr-score' }, `${o.w}-${o.d}-${o.l}  ·  ${o.gf}:${o.ga}`));
          list.append(row);
        });
        wrap.append(list);
      }
      return wrap;
    },
    actions: [{ label: 'Close', primary: true, onClick: closeModal }]
  });
}

function buildH2HMatrix(players, fixtures) {
  const res = {};
  players.forEach(r => res[r.id] = {});
  fixtures.forEach(m => {
    if (m.homeScore == null || m.awayScore == null) return;
    if (!(m.home in res) || !(m.away in res)) return;
    function add(aId, bId, gf, ga) {
      if (!res[aId][bId]) res[aId][bId] = { w: 0, d: 0, l: 0, gf: 0, ga: 0, p: 0 };
      const c = res[aId][bId]; c.p++; c.gf += gf; c.ga += ga;
      if (gf > ga) c.w++; else if (gf < ga) c.l++; else c.d++;
    }
    add(m.home, m.away, m.homeScore, m.awayScore);
    add(m.away, m.home, m.awayScore, m.homeScore);
  });
  const wrap = el('div', { class: 'h2h-wrap' });
  const tbl = el('table', { class: 'h2h' });
  const thead = el('thead'); const trh = el('tr');
  trh.append(el('th', { class: 'h2h-row-head' }, ''));
  players.forEach(c => trh.append(el('th', { title: c.name }, c.avatar || DEFAULT_AVATAR)));
  thead.append(trh); tbl.append(thead);
  const tbody = el('tbody');
  players.forEach(rp => {
    const tr = el('tr');
    const rh = el('td', { class: 'h2h-row-head' });
    rh.append(el('span', { class: 'flag' }, rp.avatar || DEFAULT_AVATAR));
    rh.append(document.createTextNode(' ' + rp.name));
    tr.append(rh);
    players.forEach(cp => {
      if (cp.id === rp.id) { tr.append(el('td', { class: 'h2h-self' }, '—')); return; }
      const c = res[rp.id][cp.id];
      const td = el('td', {});
      if (!c) td.append(el('span', { class: 'h2h-cell d' }, '·'));
      else {
        const cls = c.w > c.l ? 'w' : c.l > c.w ? 'l' : 'd';
        td.append(el('span', { class: 'h2h-cell ' + cls, title: `${rp.name} vs ${cp.name}` }, `${c.gf}–${c.ga}`));
      }
      tr.append(td);
    });
    tbody.append(tr);
  });
  tbl.append(tbody);
  wrap.append(tbl);
  return wrap;
}

function renderStats(parent) {
  const allMatches = collectAllMatches();
  const playedMatches = allMatches.filter(m => matchPlayed(m));
  if (playedMatches.length === 0) {
    parent.append(el('div', { class: 'empty' }, 'Stats appear after the first match is played.'));
    return;
  }

  // Top scorers: parse goalscorers strings, count goals
  const goalCounts = {};
  function addScorers(raw, playerId) {
    if (!raw) return;
    raw.split(/[,;\n]/).forEach(token => {
      const cleaned = token.replace(/\d+/g, '').replace(/[()'"]/g, '').trim();
      if (!cleaned) return;
      if (/^og$/i.test(cleaned)) return;
      const key = cleaned;
      if (!goalCounts[key]) goalCounts[key] = { name: cleaned, byOwner: playerId, goals: 0 };
      goalCounts[key].goals++;
    });
  }
  playedMatches.forEach(m => { addScorers(m.homeScorers, m.home); addScorers(m.awayScorers, m.away); });
  const topScorers = Object.values(goalCounts).sort((a, b) => b.goals - a.goals).slice(0, 8);

  // Biggest win, highest scoring, longest unbeaten run, clean sheets
  let biggest = null;
  let highest = null;
  playedMatches.forEach(m => {
    const gd = Math.abs(m.homeScore - m.awayScore);
    const tot = m.homeScore + m.awayScore;
    if (gd > 0 && (!biggest || gd > biggest.gd)) biggest = { match: m, gd };
    if (!highest || tot > highest.tot) highest = { match: m, tot };
  });

  // Unbeaten runs per player
  const playerMatches = {};
  state.players.forEach(p => playerMatches[p.id] = []);
  playedMatches.forEach(m => {
    playerMatches[m.home].push({ result: m.homeScore > m.awayScore ? 'W' : m.homeScore < m.awayScore ? 'L' : 'D', opp: m.away });
    playerMatches[m.away].push({ result: m.awayScore > m.homeScore ? 'W' : m.awayScore < m.homeScore ? 'L' : 'D', opp: m.home });
  });
  const unbeatenRuns = state.players.map(p => {
    let max = 0, cur = 0;
    playerMatches[p.id].forEach(r => { if (r.result !== 'L') { cur++; max = Math.max(max, cur); } else cur = 0; });
    return { player: p, run: max };
  }).sort((a, b) => b.run - a.run);
  // Clean sheets
  const cleanSheetsPer = state.players.map(p => {
    const cs = playedMatches.filter(m => (m.home === p.id && m.awayScore === 0) || (m.away === p.id && m.homeScore === 0)).length;
    return { player: p, cs };
  }).sort((a, b) => b.cs - a.cs);

  const grid = el('div', { class: 'stat-grid' });

  // Top scorers
  const tsCard = el('div', { class: 'stat-card' });
  tsCard.append(el('h4', {}, 'Top scorers'));
  if (topScorers.length === 0) {
    tsCard.append(el('div', { class: 'help' }, 'Add goalscorers per match (click "+ scorers") to populate this.'));
  } else {
    topScorers.forEach(s => {
      const row = el('div', { class: 'row' });
      row.append(el('span', {}, `${flagOf(s.byOwner)} ${s.name}`));
      row.append(el('span', { class: 'pts' }, `${s.goals} ⚽`));
      tsCard.append(row);
    });
  }
  grid.append(tsCard);

  // Biggest win
  if (biggest) {
    const c = el('div', { class: 'stat-card' });
    c.append(el('h4', {}, 'Biggest win'));
    const m = biggest.match;
    c.append(el('div', { class: 'big' }, `${m.homeScore} – ${m.awayScore}`));
    c.append(el('div', { class: 'help' }, `${nameOf(m.home)} vs ${nameOf(m.away)} (margin: ${biggest.gd})`));
    grid.append(c);
  }
  // Highest scoring
  if (highest) {
    const c = el('div', { class: 'stat-card' });
    c.append(el('h4', {}, 'Highest scoring'));
    const m = highest.match;
    c.append(el('div', { class: 'big' }, `${m.homeScore} – ${m.awayScore}`));
    c.append(el('div', { class: 'help' }, `${nameOf(m.home)} vs ${nameOf(m.away)} (${highest.tot} goals)`));
    grid.append(c);
  }
  // Longest unbeaten
  const ubCard = el('div', { class: 'stat-card' });
  ubCard.append(el('h4', {}, 'Longest unbeaten run'));
  unbeatenRuns.slice(0, 5).forEach(r => {
    const row = el('div', { class: 'row' });
    row.append(el('span', {}, `${r.player.avatar} ${r.player.name}`));
    row.append(el('span', { class: 'pts' }, `${r.run}`));
    ubCard.append(row);
  });
  grid.append(ubCard);
  // Clean sheets
  const csCard = el('div', { class: 'stat-card' });
  csCard.append(el('h4', {}, 'Clean sheets'));
  cleanSheetsPer.slice(0, 5).forEach(r => {
    const row = el('div', { class: 'row' });
    row.append(el('span', {}, `${r.player.avatar} ${r.player.name}`));
    row.append(el('span', { class: 'pts' }, `${r.cs}`));
    csCard.append(row);
  });
  grid.append(csCard);

  parent.append(grid);

  // Points progression chart(s) — the "title race" view
  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(g => {
      const gp = state.players.filter(p => g.playerIds.includes(p.id));
      parent.append(renderPointsChart(gp, g.matchdays, `Points progression — Group ${g.tag}`));
    });
  } else {
    parent.append(renderPointsChart(state.players, state.schedule.league, 'Points progression'));
  }

  // Head-to-head matrix
  if (state.players.length >= 2) {
    if (state.format === 'groups-ko') {
      state.schedule.groupSchedules.forEach(g => {
        const gp = state.players.filter(p => g.playerIds.includes(p.id));
        const card = el('div', { class: 'stat-card' });
        card.append(el('h4', {}, `Head-to-head — Group ${g.tag}`));
        card.append(buildH2HMatrix(gp, g.matchdays.flat()));
        parent.append(card);
      });
    } else {
      const card = el('div', { class: 'stat-card' });
      card.append(el('h4', {}, 'Head-to-head'));
      card.append(el('p', { class: 'help', style: 'margin:-2px 0 12px' }, 'Goals shown from the row player’s perspective.'));
      card.append(buildH2HMatrix(state.players, state.schedule.league.flat()));
      parent.append(card);
    }
  }
}

function collectAllMatches() {
  const list = [];
  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(g => list.push(...g.matchdays.flat()));
  } else {
    list.push(...state.schedule.league.flat());
  }
  // Include KO matches
  if (state.ko) {
    list.push(...state.ko.rounds.flat());
    if (state.ko.thirdPlace) list.push(state.ko.thirdPlace);
  }
  return list;
}

/* ---------------- PNG image export (canvas, no dependencies) ---------------- */
const IMG_FONT = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';
function imgFont(weight, size) { return `${weight} ${size}px ${IMG_FONT}`; }
function exportColors() {
  const g = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  return {
    bg: g('--bg') || '#ffffff', card: g('--card') || '#ffffff', card2: g('--card-2') || '#f7f9fc',
    text: g('--text') || '#0f172a', muted: g('--muted') || '#64748b', border: g('--border') || '#e8edf4',
    accent: g('--accent') || '#4f46e5', success: g('--success') || '#16a34a', danger: g('--danger') || '#e11d48',
    gold: g('--gold') || '#eab308', silver: g('--silver') || '#94a3b8', bronze: g('--bronze') || '#b45309',
  };
}
function rrect(ctx, x, y, w, h, r) {
  if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(x, y, w, h, r); return; }
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function truncText(ctx, s, maxW) {
  if (ctx.measureText(s).width <= maxW) return s;
  while (s.length > 1 && ctx.measureText(s + '…').width > maxW) s = s.slice(0, -1);
  return s + '…';
}
function makeCanvas(W, H) {
  const scale = 2;
  const canvas = document.createElement('canvas');
  canvas.width = W * scale; canvas.height = H * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);
  ctx.textBaseline = 'middle';
  return { canvas, ctx };
}
function drawImageHeader(ctx, C, W, pad, subtitle) {
  ctx.textAlign = 'left';
  ctx.fillStyle = C.text; ctx.font = imgFont(800, 24);
  ctx.fillText('🏆 Tournament Generator', pad, pad + 22);
  ctx.fillStyle = C.muted; ctx.font = imgFont(600, 14);
  ctx.fillText(subtitle, pad, pad + 46);
}
function drawImageFooter(ctx, C, W, H, pad) {
  ctx.fillStyle = C.muted; ctx.font = imgFont(500, 12); ctx.textAlign = 'right';
  ctx.fillText('Made with Tournament Generator · ' + new Date().toLocaleDateString(), W - pad, H - 20);
}
function downloadCanvas(canvas, filename) {
  canvas.toBlob(blob => {
    if (!blob) { toast('Could not generate image'); return; }
    const url = URL.createObjectURL(blob);
    const a = el('a', { href: url, download: filename });
    document.body.append(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}

function exportStandingsCanvas() {
  const C = exportColors();
  const W = 840, pad = 30;
  const sections = [];
  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(g => {
      const players = state.players.filter(p => g.playerIds.includes(p.id));
      sections.push({ title: `Group ${g.tag}`, rows: computeTable(players, g.matchdays.flat()), qual: state.perGroupAdvance });
    });
  } else {
    const qual = state.format === 'league-ko' ? state.koSize : 0;
    sections.push({ title: state.format === 'swiss' ? 'Swiss standings' : 'League table', rows: computeTable(state.players, state.schedule.league.flat()), qual });
  }
  const titleH = 72, headerH = 32, rowH = 38, secTitleH = 30, secGap = 24, footerH = 40;
  let H = pad + titleH;
  sections.forEach(s => { H += secTitleH + headerH + s.rows.length * rowH + secGap; });
  H += footerH;

  const { canvas, ctx } = makeCanvas(W, H);
  ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);
  drawImageHeader(ctx, C, W, pad, state.format === 'groups-ko' ? 'Group tables' : (state.format === 'swiss' ? 'Swiss standings' : 'Final table'));

  const x0 = pad, contentW = W - pad * 2;
  const numCols = ['P', 'W', 'D', 'L', 'GF', 'GA', 'GD'];
  const numW = 40, ptsW = 46, formW = 110, posW = 40;
  const teamW = contentW - posW - numCols.length * numW - ptsW - formW;
  const posCX = x0 + posW / 2;
  const teamX = x0 + posW + 6;
  const numStart = x0 + posW + teamW;
  const numCX = i => numStart + i * numW + numW / 2;
  const ptsCX = numStart + numCols.length * numW + ptsW / 2;
  const formX = numStart + numCols.length * numW + ptsW + 6;

  let y = pad + titleH;
  sections.forEach(sec => {
    ctx.fillStyle = C.text; ctx.font = imgFont(700, 16); ctx.textAlign = 'left';
    ctx.fillText(sec.title, x0, y + secTitleH / 2); y += secTitleH;

    ctx.fillStyle = C.card2; rrect(ctx, x0, y, contentW, headerH, 8); ctx.fill();
    ctx.fillStyle = C.muted; ctx.font = imgFont(600, 11);
    ctx.textAlign = 'center'; ctx.fillText('POS', posCX, y + headerH / 2);
    ctx.textAlign = 'left'; ctx.fillText('TEAM', teamX, y + headerH / 2);
    ctx.textAlign = 'center';
    numCols.forEach((c, i) => ctx.fillText(c, numCX(i), y + headerH / 2));
    ctx.fillText('PTS', ptsCX, y + headerH / 2);
    ctx.textAlign = 'left'; ctx.fillText('FORM', formX, y + headerH / 2);
    y += headerH;

    sec.rows.forEach((r, idx) => {
      const pos = idx + 1;
      if (sec.qual && pos <= sec.qual) { ctx.fillStyle = C.success; ctx.fillRect(x0, y, 3, rowH); }
      ctx.strokeStyle = C.border; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x0, y + rowH - 0.5); ctx.lineTo(x0 + contentW, y + rowH - 0.5); ctx.stroke();

      ctx.textAlign = 'center';
      ctx.fillStyle = pos === 1 ? C.gold : pos === 2 ? C.silver : pos === 3 ? C.bronze : C.muted;
      ctx.font = imgFont(700, 14);
      ctx.fillText(String(pos), posCX, y + rowH / 2);

      ctx.textAlign = 'left'; ctx.fillStyle = C.text; ctx.font = imgFont(600, 14);
      ctx.fillText(truncText(ctx, `${r.avatar || '⚽'}  ${r.name}`, teamW - 10), teamX, y + rowH / 2);

      ctx.textAlign = 'center'; ctx.font = imgFont(500, 13);
      const vals = [r.played, r.won, r.drawn, r.lost, r.gf, r.ga, (r.gd > 0 ? '+' : '') + r.gd];
      vals.forEach((v, i) => {
        ctx.fillStyle = i === 6 ? (r.gd > 0 ? C.success : r.gd < 0 ? C.danger : C.muted) : C.text;
        ctx.fillText(String(v), numCX(i), y + rowH / 2);
      });
      ctx.fillStyle = C.text; ctx.font = imgFont(800, 14);
      ctx.fillText(String(r.points), ptsCX, y + rowH / 2);

      let fx = formX;
      r.form.slice(-5).forEach(letter => {
        ctx.fillStyle = letter === 'W' ? C.success : letter === 'L' ? C.danger : C.silver;
        rrect(ctx, fx, y + rowH / 2 - 9, 18, 18, 4); ctx.fill();
        ctx.fillStyle = '#fff'; ctx.font = imgFont(700, 10); ctx.textAlign = 'center';
        ctx.fillText(letter, fx + 9, y + rowH / 2);
        fx += 22;
      });
      y += rowH;
    });
    y += secGap;
  });

  drawImageFooter(ctx, C, W, H, pad);
  return canvas;
}

function drawKoBox(ctx, C, m, x, y, w, h) {
  ctx.fillStyle = C.card; rrect(ctx, x, y, w, h, 10); ctx.fill();
  ctx.strokeStyle = C.border; ctx.lineWidth = 1; rrect(ctx, x, y, w, h, 10); ctx.stroke();
  const winner = koWinner(m);
  const rowH = h / 2;
  const drawRow = (isHome, ry) => {
    const id = isHome ? m.home : m.away;
    const label = isHome ? m.homeLabel : m.awayLabel;
    const isWin = winner && winner.playerId === id;
    const isLose = winner && id && winner.playerId !== id;
    if (isWin) { ctx.fillStyle = C.accent + '22'; rrect(ctx, x + 3, ry + 3, w - 6, rowH - 5, 6); ctx.fill(); }
    let sc = '';
    if (m.legs === 2 && m.home && m.away) { const a = koAggregate(m); sc = String(isHome ? a.home : a.away); }
    else { const v = isHome ? m.homeScore : m.awayScore; sc = v != null ? String(v) : ''; }
    // Show penalty result inline when a tie was settled on pens.
    if (m.homePen != null && m.awayPen != null && (isHome ? m.home : m.away)) {
      sc += ` (${isHome ? m.homePen : m.awayPen})`;
    }
    ctx.textAlign = 'left'; ctx.font = imgFont(isWin ? 800 : 600, 13);
    ctx.fillStyle = id ? (isLose ? C.muted : C.text) : C.muted;
    const name = id ? `${flagOf(id)}  ${nameOf(id)}` : (label || 'TBD');
    ctx.fillText(truncText(ctx, name, w - 60), x + 12, ry + rowH / 2);
    ctx.textAlign = 'right'; ctx.font = imgFont(800, 13); ctx.fillStyle = isLose ? C.muted : C.text;
    ctx.fillText(sc, x + w - 12, ry + rowH / 2);
  };
  drawRow(true, y);
  drawRow(false, y + rowH);
  ctx.strokeStyle = C.border; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x + 8, y + rowH); ctx.lineTo(x + w - 8, y + rowH); ctx.stroke();
}

function exportBracketCanvas() {
  const C = exportColors();
  const rounds = state.ko.rounds;
  const boxW = 212, boxH = 58, colGap = 54, vGap = 24, pad = 30, titleH = 78, footerH = 40;
  const R0 = rounds[0].length;
  const bracketH = R0 * boxH + (R0 - 1) * vGap;

  const centers = [];
  rounds.forEach((round, r) => {
    centers[r] = [];
    round.forEach((m, i) => {
      centers[r][i] = r === 0 ? i * (boxH + vGap) + boxH / 2 : (centers[r - 1][2 * i] + centers[r - 1][2 * i + 1]) / 2;
    });
  });
  const colW = boxW + colGap;
  const W = pad * 2 + rounds.length * boxW + (rounds.length - 1) * colGap;
  const third = state.ko.thirdPlace;
  const thirdH = third ? boxH + 44 : 0;
  const H = pad + titleH + bracketH + thirdH + footerH;

  const { canvas, ctx } = makeCanvas(W, H);
  ctx.fillStyle = C.bg; ctx.fillRect(0, 0, W, H);
  drawImageHeader(ctx, C, W, pad, 'Knockout bracket');
  const topY = pad + titleH;

  rounds.forEach((round, r) => {
    const x = pad + r * colW;
    ctx.fillStyle = C.muted; ctx.font = imgFont(700, 11); ctx.textAlign = 'left';
    ctx.fillText(koRoundLabel(r, rounds.length).toUpperCase(), x, topY - 16);
    round.forEach((m, i) => {
      const cy = topY + centers[r][i];
      if (r < rounds.length - 1) {
        const midX = x + boxW + colGap / 2;
        ctx.strokeStyle = C.border; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(x + boxW, cy); ctx.lineTo(midX, cy); ctx.stroke();
        if (i % 2 === 0 && round[i + 1]) {
          const sib = topY + centers[r][i + 1];
          const nextCy = topY + centers[r + 1][i / 2];
          ctx.beginPath(); ctx.moveTo(midX, cy); ctx.lineTo(midX, sib); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(midX, nextCy); ctx.lineTo(x + colW, nextCy); ctx.stroke();
        }
      }
      drawKoBox(ctx, C, m, x, cy - boxH / 2, boxW, boxH);
    });
  });

  if (third) {
    const x = pad, y = topY + bracketH + 30;
    ctx.fillStyle = C.muted; ctx.font = imgFont(700, 11); ctx.textAlign = 'left';
    ctx.fillText('THIRD-PLACE PLAYOFF', x, y - 12);
    drawKoBox(ctx, C, third, x, y, boxW, boxH);
  }

  drawImageFooter(ctx, C, W, H, pad);
  return canvas;
}

document.getElementById('btnImage').addEventListener('click', () => {
  const stamp = new Date().toISOString().slice(0, 10);
  const actions = [{
    label: state.format === 'groups-ko' ? 'Group tables' : (state.format === 'swiss' ? 'Standings' : 'League table'),
    primary: true,
    onClick: () => { closeModal(); downloadCanvas(exportStandingsCanvas(), `tournament-standings-${stamp}.png`); toast('Saved standings image'); },
  }];
  if (state.ko) actions.push({
    label: 'Knockout bracket',
    onClick: () => { closeModal(); downloadCanvas(exportBracketCanvas(), `tournament-bracket-${stamp}.png`); toast('Saved bracket image'); },
  });
  actions.push({ label: 'Cancel', onClick: closeModal });
  showModal({
    title: 'Save as image',
    body: () => el('p', {}, 'Download a shareable PNG that matches your current theme.'),
    actions,
  });
});

document.getElementById('btnPrint').addEventListener('click', () => window.print());

/* ---------------- Simulate remaining matches ---------------- */
function randScore() {
  // Weighted toward realistic low scores.
  const dist = [0, 0, 1, 1, 1, 2, 2, 3, 4, 5];
  return dist[Math.floor(Math.random() * dist.length)];
}
function simulateRemaining() {
  let filled = 0;
  const fillFlat = list => list.forEach(m => {
    if (m.bye != null) return;
    if (m.homeScore == null || m.awayScore == null) {
      m.homeScore = randScore();
      m.awayScore = randScore();
      filled++;
    }
  });

  if (state.format === 'groups-ko') {
    state.schedule.groupSchedules.forEach(g => fillFlat(g.matchdays.flat()));
  } else if (state.format === 'swiss') {
    // Fill the current round, generate the next, repeat through all rounds.
    let guard = 0;
    while (guard++ < 60) {
      fillFlat(state.schedule.league.flat());
      if (state.schedule.league.length < state.swissRounds && swissRoundComplete()) {
        generateSwissRound();
      } else break;
    }
  } else {
    fillFlat(state.schedule.league.flat());
  }

  // If the group/league stage just completed, build the bracket so it can be simulated too.
  if (state.format !== 'league' && !state.ko && isStageComplete()) buildBracket();

  // Knockout: fill round by round so winners propagate before the next round is decided.
  if (state.ko) {
    let guard = 0;
    while (guard++ < 30) {
      koResolveBracket(state.ko);
      const all = state.ko.rounds.flat().concat(state.ko.thirdPlace ? [state.ko.thirdPlace] : []);
      let progressed = false;
      all.forEach(m => {
        if (!(m.home && m.away)) return;
        let changed = false;
        if (m.homeScore == null) { m.homeScore = randScore(); changed = true; }
        if (m.awayScore == null) { m.awayScore = randScore(); changed = true; }
        if (m.legs === 2) {
          if (m.l2h == null) { m.l2h = randScore(); changed = true; }
          if (m.l2a == null) { m.l2a = randScore(); changed = true; }
        }
        // Ensure a decisive penalty shootout when the tie is level.
        if (koNeedsShootout(m) && (m.homePen == null || m.awayPen == null || m.homePen === m.awayPen)) {
          let hp = 3 + Math.floor(Math.random() * 3);
          let ap = 3 + Math.floor(Math.random() * 3);
          if (hp === ap) (Math.random() < 0.5 ? hp++ : ap++);
          m.homePen = hp;
          m.awayPen = ap;
          changed = true;
        }
        if (changed) { filled++; progressed = true; }
      });
      if (!progressed) break;
    }
  }

  saveState();
  renderTournament();
  maybeCelebrate();
  toast(filled ? `Simulated ${filled} match${filled === 1 ? '' : 'es'}` : 'No matches left to simulate');
}

document.getElementById('btnSimulate').addEventListener('click', () => {
  showModal({
    title: 'Simulate remaining matches?',
    body: () => el('p', {}, 'Every unplayed match (and any knockout rounds that unlock) gets a random scoreline. Results you’ve already entered are kept.'),
    actions: [
      { label: 'Cancel', onClick: closeModal },
      { label: 'Simulate', primary: true, onClick: () => { closeModal(); simulateRemaining(); } },
    ],
  });
});

document.getElementById('btnReset').addEventListener('click', () => {
  showModal({
    title: 'Reset tournament?',
    body: () => el('p', {}, 'This deletes all current scores and players. Cannot be undone.'),
    actions: [
      { label: 'Cancel', onClick: closeModal },
      { label: 'Yes, reset', primary: true, onClick: () => {
        const keepTheme = (state && state.settings && state.settings.theme) || 'classic';
        clearState();
        lastCelebratedChampionId = null;
        state = defaultState();
        state.settings.theme = keepTheme;
        activeTab = 'fixtures';
        fixtureFilter = 'all';
        mdExpansionOverrides = new Map();
        location.hash = '';
        closeModal();
        setTheme(keepTheme);
        renderSetup();
      }}
    ]
  });
});

/* ---------------- Modal ---------------- */
function showModal({ title, body, actions, wide }) {
  const bg = document.getElementById('modalBg');
  const m = document.getElementById('modal');
  m.className = 'modal' + (wide ? ' wide' : '');
  clear(m);
  m.append(el('h3', {}, title));
  const b = typeof body === 'function' ? body() : (body || el('div'));
  m.append(b);
  const a = el('div', { class: 'actions' });
  (actions || []).forEach(act => {
    const btn = el('button', { class: 'btn' + (act.primary ? ' primary' : '') }, act.label);
    btn.addEventListener('click', act.onClick);
    a.append(btn);
  });
  m.append(a);
  bg.classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeFlagPicker();
  }
});

/* ---------------- Init ---------------- */
function init() {
  // Handle share URL
  if (location.hash.startsWith('#share=')) {
    const shared = decodeShare(location.hash.slice(7));
    if (shared && shared.version === VERSION) {
      const existing = loadState();
      if (existing) {
        showModal({
          title: 'Load shared tournament?',
          body: () => el('p', {}, 'This will replace your current tournament. Continue?'),
          actions: [
            { label: 'Cancel', onClick: () => { closeModal(); location.hash = ''; bootFromStorage(); } },
            { label: 'Load shared', primary: true, onClick: () => {
              state = shared; state.phase = 'playing';
              saveState(); closeModal(); location.hash = '';
              renderTournament();
            }}
          ]
        });
        return;
      } else {
        state = shared; state.phase = 'playing';
        saveState(); location.hash = '';
        renderTournament();
        return;
      }
    }
  }
  bootFromStorage();
}
function bootFromStorage() {
  const saved = loadState();
  if (saved && saved.phase === 'playing') {
    state = saved;
    soundOn = state.settings && state.settings.sound !== false;
    document.getElementById('btnSound').textContent = soundOn ? '🔊' : '🔇';
    setTheme((state.settings && state.settings.theme) || 'classic');
    renderTournament();
  } else {
    state = saved || defaultState();
    setTheme((state.settings && state.settings.theme) || 'classic');
    renderSetup();
  }
}

init();
</script>
